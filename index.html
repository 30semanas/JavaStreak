<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>JavaStreak</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{
    --verde:#2e4d2e; --verde-claro:#3f6b3f; --verde-esc:#213a21;
    --terra:#8a6d3b; --areia:#f4f1e8; --card:#ffffff;
    --txt:#22301f; --txt2:#5c6b58; --linha:#e2ded2;
    --danger:#b23b3b; --ok:#2f7d3a; --alerta:#c8892b;
    --sombra:0 2px 8px rgba(0,0,0,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
       background:var(--areia);color:var(--txt);padding-bottom:80px}
  header{position:sticky;top:0;z-index:1100;background:var(--verde);color:#fff;
         padding:12px 14px;display:flex;align-items:center;gap:10px;box-shadow:var(--sombra)}
  header .back{font-size:22px;cursor:pointer;width:30px;line-height:1;opacity:.95}
  header .titulo{font-size:16px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  header .sub{font-size:11px;opacity:.75;font-weight:400;display:block}
  .wrap{max-width:640px;margin:0 auto;padding:14px}
  .crumb{font-size:12px;color:var(--txt2);margin:2px 0 12px;display:flex;flex-wrap:wrap;gap:4px}
  .crumb b{color:var(--verde)}

  .card{background:var(--card);border:1px solid var(--linha);border-radius:14px;
        padding:14px;margin-bottom:12px;box-shadow:var(--sombra)}
  .card.click{cursor:pointer;transition:transform .06s}
  .card.click:active{transform:scale(.985)}
  .card h3{margin:0 0 4px;font-size:16px}
  .card .meta{font-size:12px;color:var(--txt2);line-height:1.5}
  .row{display:flex;align-items:center;gap:10px}
  .grow{flex:1}
  .pill{display:inline-block;background:var(--verde-claro);color:#fff;font-size:11px;
        padding:3px 9px;border-radius:20px;margin:2px 4px 0 0}
  .pill.gray{background:#98a08f}
  .pill.warn{background:var(--alerta)} .pill.ok{background:var(--ok)} .pill.dan{background:var(--danger)}

  .menu-card{display:flex;align-items:center;gap:14px}
  .menu-card .ic{font-size:26px;width:44px;height:44px;border-radius:12px;
                 display:flex;align-items:center;justify-content:center;background:var(--areia)}
  .menu-card .txt h3{margin:0;font-size:15px}
  .menu-card .txt p{margin:2px 0 0;font-size:12px;color:var(--txt2)}
  .menu-card .chev{margin-left:auto;color:#b7bdae;font-size:20px}
  .menu-card.disabled{opacity:.5}

  label{display:block;font-size:13px;font-weight:600;color:var(--txt2);margin:12px 0 5px}
  input,select,textarea{width:100%;padding:11px 12px;border:1px solid var(--linha);
        border-radius:10px;font-size:15px;background:#fff;color:var(--txt);font-family:inherit}
  textarea{min-height:70px;resize:vertical}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--verde-claro);
        box-shadow:0 0 0 3px rgba(63,107,63,.15)}
  .two{display:flex;gap:10px} .two>div{flex:1}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
       width:100%;padding:13px;border:none;border-radius:11px;font-size:15px;font-weight:600;
       cursor:pointer;background:var(--verde);color:#fff;margin-top:16px}
  .btn:active{background:var(--verde-esc)}
  .btn.sec{background:#fff;color:var(--verde);border:1.5px solid var(--verde)}
  .btn.gps{background:var(--terra);margin-top:6px;padding:10px}
  .btn.sm{width:auto;padding:9px 14px;font-size:13px;margin-top:0}
  .btn.danger{background:var(--danger)}

  .fab{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);max-width:612px;width:calc(100% - 28px);z-index:900}
  .fab .btn{box-shadow:0 6px 18px rgba(46,77,46,.4)}

  .checks{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
  .check{display:flex;align-items:center;gap:7px;background:#fff;border:1.5px solid var(--linha);
         padding:9px 12px;border-radius:10px;font-size:14px;cursor:pointer;user-select:none}
  .check.on{border-color:var(--verde);background:#eef3ea;color:var(--verde);font-weight:600}
  .check input{width:auto;margin:0}

  .empty{text-align:center;color:var(--txt2);padding:34px 16px;font-size:14px}
  .empty .big{font-size:40px;margin-bottom:8px;opacity:.5}

  .tabs{display:flex;gap:6px;margin:4px 0 14px;background:#fff;padding:5px;border-radius:12px;border:1px solid var(--linha)}
  .tab{flex:1;text-align:center;padding:9px;border-radius:8px;font-size:13px;font-weight:600;color:var(--txt2);cursor:pointer}
  .tab.on{background:var(--verde);color:#fff}

  .foto-prev{width:100%;max-height:220px;object-fit:cover;border-radius:10px;margin-top:8px;display:none;border:1px solid var(--linha)}
  .thumb{width:64px;height:64px;object-fit:cover;border-radius:10px;border:1px solid var(--linha)}

  .nivel-bar{height:14px;background:#e7e3d6;border-radius:8px;overflow:hidden;margin-top:6px}
  .nivel-bar span{display:block;height:100%;background:linear-gradient(90deg,#c8892b,#2f7d3a)}
  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:#222;color:#fff;
         padding:11px 18px;border-radius:24px;font-size:14px;z-index:2000;opacity:0;transition:.25s;pointer-events:none;max-width:90%}
  .toast.show{opacity:1}
  .loading{text-align:center;padding:40px;color:var(--txt2)}
  .spin{width:26px;height:26px;border:3px solid var(--linha);border-top-color:var(--verde);
        border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 10px}
  @keyframes sp{to{transform:rotate(360deg)}}
  /* ===== Animação de caça no carregamento ===== */
  .hunt{position:fixed;top:56px;left:0;right:0;bottom:0;z-index:60;overflow:hidden;pointer-events:none}
  .hunt-boar{position:absolute;top:50%;left:50%;width:min(20vw,210px);transform:translate(-50%,-50%);animation:huntBoar 3s ease-in-out infinite;filter:drop-shadow(0 6px 8px rgba(0,0,0,.3))}
  .hunt-mira{position:absolute;top:50%;left:50%;width:min(10vw,108px);height:min(10vw,108px);transform:translate(-50%,-50%);animation:huntMira 3s ease-in-out infinite}
  .hunt-flash{position:absolute;top:50%;left:50%;width:min(16vw,165px);height:min(16vw,165px);border-radius:50%;transform:translate(-50%,-50%) scale(.2);opacity:0;pointer-events:none;background:radial-gradient(circle,#fff 0%,#ffb347 38%,rgba(255,140,0,0) 70%);animation:huntFlash 3s ease-in-out infinite}
  @keyframes huntBoar{
    0%{transform:translate(-50%,-50%) translateX(75vw);opacity:1}
    30%{transform:translate(-50%,-50%) translateX(0);opacity:1}
    60%{transform:translate(-50%,-50%) translateX(0);opacity:1}
    66%{transform:translate(-50%,-50%) translateX(2vw) rotate(5deg);opacity:.92}
    74%{transform:translate(-50%,-50%) translateX(6vw) scale(.6) rotate(14deg);opacity:0}
    100%{transform:translate(-50%,-50%) translateX(6vw) scale(.6);opacity:0}
  }
  @keyframes huntMira{
    0%{transform:translate(-50%,-50%) translateX(-75vw) scale(1.5);opacity:0}
    18%{opacity:.9}
    56%{transform:translate(-50%,-50%) translateX(0) scale(1);opacity:.95}
    63%{transform:translate(-50%,-50%) translateX(0) scale(.82);opacity:1}
    70%{transform:translate(-50%,-50%) translateX(0) scale(1);opacity:.55}
    100%{transform:translate(-50%,-50%) translateX(0) scale(1);opacity:0}
  }
  @keyframes huntFlash{
    0%,62%{opacity:0;transform:translate(-50%,-50%) scale(.2)}
    66%{opacity:1;transform:translate(-50%,-50%) scale(1)}
    72%{opacity:0;transform:translate(-50%,-50%) scale(1.35)}
    100%{opacity:0}
  }
  .hunt-txt{position:absolute;bottom:8%;left:0;right:0;text-align:center;color:var(--txt2);font-size:15px}
  @media(min-width:900px){ body.logged .hunt{left:250px} }
  a.mapa{font-size:12px;color:var(--terra);text-decoration:none}
  .dot{width:11px;height:11px;border-radius:50%;background:#9aa38c;flex:none;transition:.25s}
  .dot.on{background:#4ade80;box-shadow:0 0 0 3px rgba(74,222,128,.30)}
  .dot.off{background:#f87171;box-shadow:0 0 0 3px rgba(248,113,113,.30)}

  .acoes{display:flex;gap:6px;margin-left:auto}
  .ib{background:var(--areia);border:1px solid var(--linha);border-radius:9px;padding:7px 9px;font-size:14px;cursor:pointer;line-height:1}
  .ib:active{background:#e7e3d6}
  #map{height:56vh;min-height:320px;border-radius:14px;border:1px solid var(--linha);z-index:1}
  .leaflet-popup-content{margin:10px 12px;font-family:inherit}
  .pop h4{margin:0 0 4px;font-size:14px;color:var(--verde)}
  .pop .meta{font-size:12px;color:var(--txt2);line-height:1.5}
  .dash{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .kpi{flex:1;min-width:90px;background:#fff;border:1px solid var(--linha);border-radius:12px;padding:10px 12px;box-shadow:var(--sombra)}
  .kpi b{display:block;font-size:22px;color:var(--verde)} .kpi span{font-size:11px;color:var(--txt2)}
  .legend{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--txt2);margin-top:8px}
  .legend i{width:11px;height:11px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}
  .filtros{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
  .chip{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1.5px solid var(--linha);color:var(--txt2);padding:6px 10px;border-radius:20px;font-size:12px;cursor:pointer;user-select:none}
  .chip.on{border-color:var(--verde);background:#eef3ea;color:var(--verde);font-weight:600}
  .chip i{width:10px;height:10px;border-radius:50%;display:inline-block}
  .cal{background:#fff;border:1px solid var(--linha);border-radius:14px;padding:10px 12px;margin-bottom:12px;box-shadow:var(--sombra)}
  .calhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .calhead b{font-size:14px}
  .cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
  .cwd{text-align:center;font-size:11px;color:var(--txt2);padding:4px 0;font-weight:600}
  .cday{position:relative;text-align:center;padding:9px 0;font-size:13px;border-radius:8px;cursor:pointer}
  .cday.empty{cursor:default}
  .cday.tem{font-weight:700}
  .cday.hoje{outline:2px solid var(--verde-claro);outline-offset:-2px}
  .cday.sel{background:var(--verde);color:#fff}
  .cdot{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:6px;height:6px;border-radius:50%}

  /* ===== BARRA LATERAL ===== */
  #sidebar{position:fixed;top:0;left:0;bottom:0;width:250px;z-index:1300;transform:translateX(-100%);transition:transform .25s;
           background:linear-gradient(#243b20,#1a2c16);color:#e9e2cf;display:flex;flex-direction:column;box-shadow:2px 0 14px rgba(0,0,0,.35);overflow-y:auto}
  body.logged.menu-open #sidebar{transform:translateX(0)}
  #overlay{position:fixed;inset:0;background:rgba(20,14,6,.5);z-index:1250;opacity:0;pointer-events:none;transition:.25s}
  body.logged.menu-open #overlay{opacity:1;pointer-events:auto}
  .sb-brand{padding:12px 10px;display:flex;justify-content:center;border-bottom:1px solid rgba(255,255,255,.12)}
  .sb-brand img{width:100%;max-width:200px;height:auto;max-height:200px;object-fit:contain;border-radius:8px}
  .sb-user{padding:9px 16px;font-size:12px;color:#b7c3a5;border-bottom:1px solid rgba(255,255,255,.08);text-transform:uppercase;letter-spacing:.3px}
  #sbNav{flex:1;padding:8px}
  .sb-item{display:flex;align-items:center;gap:12px;padding:11px 14px;margin:7px 6px;border-radius:7px;cursor:pointer;position:relative;
    font-family:Georgia,'Times New Roman',serif;font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:.5px;color:#f6e8cc;
    background:repeating-linear-gradient(88deg,rgba(0,0,0,.06) 0 3px,rgba(255,255,255,.03) 3px 9px),linear-gradient(180deg,#a06a3a 0%,#8a5a30 55%,#754a27 100%);
    border:1px solid #5a3a1e;
    box-shadow:0 3px 5px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.18),inset 0 -3px 5px rgba(60,35,15,.4);
    transition:filter .12s,transform .12s}
  .sb-item:hover{filter:brightness(1.07);transform:translateX(2px)}
  .sb-item.active{box-shadow:0 3px 8px rgba(0,0,0,.45),inset 0 0 0 2px #ee8a2e,inset 0 1px 0 rgba(255,255,255,.18)}
  .sb-item img{width:42px;height:42px;object-fit:contain;flex:none;filter:drop-shadow(0 1px 1px rgba(255,255,255,.18)) drop-shadow(0 -1px 1px rgba(0,0,0,.55))}
  .sb-item span{text-shadow:0 1px 1px rgba(40,20,5,.65),0 0 1px rgba(0,0,0,.35)}
  .sb-item .emoji{width:42px;text-align:center;font-size:22px;flex:none;filter:drop-shadow(0 1px 1px rgba(0,0,0,.4))}
  .sb-sair{margin:8px 12px 14px;padding:11px;border:1px solid rgba(255,255,255,.3);background:transparent;color:#e9e2cf;border-radius:10px;cursor:pointer;font-size:14px;text-transform:uppercase;letter-spacing:.3px}
  .sb-switch{display:flex;gap:6px;margin:8px 8px 10px;background:rgba(0,0,0,.18);border-radius:12px;padding:4px}
  .sb-switch button{flex:1;border:none;background:transparent;color:#cdd6bf;font-size:12px;font-weight:700;padding:8px 4px;border-radius:9px;cursor:pointer;text-transform:uppercase;letter-spacing:.3px}
  .sb-switch button.on{background:linear-gradient(#ee8a2e,#d9761f);color:#fff;box-shadow:0 2px 6px rgba(0,0,0,.25)}
  .sb-cfg{margin-top:8px;border-top:1px solid rgba(255,255,255,.10);border-radius:0;padding-top:14px}
  .segbar{display:flex;gap:8px;margin:8px 0 12px;background:#efe3cc;border:1px solid #e0d4b6;border-radius:14px;padding:5px}
  .segbar button{flex:1;border:none;background:transparent;color:var(--txt2);font-size:14px;font-weight:700;padding:11px 6px;border-radius:10px;cursor:pointer}
  .segbar button.on{background:linear-gradient(#3a5a34,#2e4d2e);color:#fff;box-shadow:0 2px 8px rgba(46,77,46,.3)}
  .hbell{position:relative;background:transparent;border:none;color:#fff;font-size:19px;cursor:pointer;width:32px}
  .hbadge{position:absolute;top:-4px;right:-2px;background:#ee2e2e;color:#fff;font-size:10px;font-weight:700;min-width:16px;height:16px;line-height:16px;border-radius:9px;padding:0 3px;display:none}
  .hbadge.on{display:block}
  #promoPanel{position:fixed;inset:0;background:rgba(20,14,6,.5);z-index:3200;display:none;justify-content:center;align-items:flex-start;padding:16px}
  #promoPanel.open{display:flex}
  #salaPanel{position:fixed;inset:0;background:rgba(20,14,6,.5);z-index:3200;display:none;justify-content:center;align-items:flex-start;padding:16px}
  #salaPanel.open{display:flex}
  #denModal{position:fixed;inset:0;background:rgba(20,14,6,.55);z-index:3400;display:none;justify-content:center;align-items:flex-start;padding:16px}
  #denModal.open{display:flex}
  .emoji-me>div{filter:drop-shadow(0 0 3px #ee8a2e);transform:scale(1.15)}
  .mk-avwrap{background:transparent}
  .mk-av{width:100%;height:100%;border-radius:50%;background-size:cover;background-position:center;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.4)}
  .mk-av.me{border-color:#ee8a2e;box-shadow:0 0 0 3px rgba(238,138,46,.4),0 2px 6px rgba(0,0,0,.4)}
  .avpic{width:100%;height:100%;border-radius:50%;object-fit:cover}
  .promo-box{background:var(--papel,#fbf7ee);border:1px solid var(--linha);border-radius:16px;width:100%;max-width:440px;max-height:88vh;overflow:auto;padding:14px;box-shadow:0 10px 30px rgba(0,0,0,.4);margin-top:40px}
  .preco-old{text-decoration:line-through;color:var(--danger);font-weight:600}
  .preco-new{color:#2e8b3d;font-weight:800;font-size:18px}
  .lnk-den{background:none;border:none;color:#b09a86;font-size:12px;cursor:pointer;padding:2px 4px;text-decoration:underline;opacity:.85}
  .lnk-den:hover{color:#8a3a2c;opacity:1}
  #mapPicker{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:3300;display:none;flex-direction:column;padding:12px}
  #mapPicker.open{display:flex}
  .mp-box{background:#fff;border-radius:14px;overflow:hidden;display:flex;flex-direction:column;flex:1;max-width:760px;width:100%;margin:0 auto}
  .mp-head,.mp-foot{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--papel,#fbf7ee)}
  .mp-head{border-bottom:1px solid var(--linha)} .mp-foot{border-top:1px solid var(--linha)}
  #pickMap{flex:1;width:100%;min-height:300px}
  .galeria{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
  .trof{position:relative;border-radius:12px;overflow:hidden;background:#fff;border:1px solid var(--linha);box-shadow:0 2px 8px rgba(60,40,18,.08)}
  .trof img{width:100%;height:140px;object-fit:cover;display:block;cursor:pointer}
  .trof .tt{padding:6px 8px;font-size:12px;color:var(--txt2)}
  .trof .tv{position:absolute;top:6px;left:6px;background:rgba(0,0,0,.58);color:#fff;font-size:12px;font-weight:700;padding:2px 8px;border-radius:11px}
  .trofdel{position:absolute;top:4px;right:4px;background:rgba(255,255,255,.9)}
  .trofden{position:absolute;top:4px;left:4px;background:rgba(255,255,255,.9);z-index:3}
  .votbtn{display:block;width:calc(100% - 16px);margin:6px 8px 8px;border:1px solid var(--linha);background:#fff;border-radius:20px;padding:6px 12px;font-weight:700;cursor:pointer}
  .votbtn.on{background:linear-gradient(#3a5a34,#2e4d2e);color:#fff;border-color:transparent}
  .stars{display:inline-flex;gap:1px;vertical-align:middle}
  .stars .star{color:#d3c19a;line-height:1}
  .stars.ro{font-size:15px}
  .stars.ro .star.on{color:#f0a92e}
  .stars.vote{margin:6px 8px 8px;font-size:26px;gap:3px}
  .stars.vote .star{cursor:pointer;color:#cbb78a;transition:transform .08s}
  .stars.vote .star:hover{transform:scale(1.15)}
  .stars.vote .star.on{color:#f0a92e}
  .vc{color:var(--txt2);font-size:11px}
  .sai{display:inline-block;margin-top:3px;font-size:11px;font-weight:700;color:var(--laranja-esc)}
  .trof .rk{position:absolute;top:6px;right:6px;background:#2e4d2e;color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;z-index:2}
  .sb-sair:active{background:rgba(255,255,255,.08)}
  .hamb{font-size:22px;background:transparent;border:none;color:#fff;cursor:pointer;width:32px;line-height:1;display:none}
  @media(max-width:899px){ body.logged .hamb{display:block} }
  @media(min-width:900px){
    body.logged #sidebar{transform:translateX(0)}
    body.logged header, body.logged .wrap, body.logged #topnav, body.logged #topbarLine{margin-left:250px}
    body.logged .fab{left:calc(50% + 125px)}
    #overlay{display:none}
  }

  /* ===== TEMA RÚSTICO ===== */
  body{background:#e9ddc4;
       background-image:linear-gradient(rgba(90,60,25,.030) 1px,transparent 1px),linear-gradient(90deg,rgba(90,60,25,.030) 1px,transparent 1px);
       background-size:24px 24px}
  header{background:linear-gradient(#2e4d2e,#24401d);border-bottom:3px solid #ee8a2e}
  .card{border-color:#d9cdae;box-shadow:0 1px 3px rgba(70,45,18,.13)}
  .card h3, header .titulo, .sb-brand, .empty{font-family:Georgia,'Times New Roman',serif}
  .btn{background:linear-gradient(#3a5a34,#2e4d2e);box-shadow:0 1px 0 rgba(0,0,0,.15)}
  .btn.gps{background:linear-gradient(#9a7b41,#7a5c2c)}
  .menu-card .ic{background:#efe3cc;border:1px solid #e0d4b6}
  .pill{border:1px solid rgba(0,0,0,.06)}
  .rustic-hero{background:linear-gradient(135deg,#f3ead2,#e7d9b8);border:1px solid #d8c79f}

  /* ===== POLIMENTO MODERNO (mantendo o rústico) ===== */
  :root{ --sombra:0 4px 14px rgba(60,40,18,.10); }
  .card{border-radius:16px;box-shadow:0 3px 10px rgba(60,40,18,.08),0 1px 2px rgba(60,40,18,.05);
        transition:transform .14s ease,box-shadow .14s ease,border-color .14s ease}
  .card.click:hover,.menu-card.click:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(60,40,18,.15);border-color:#cbbf9e}
  .card.click:active{transform:translateY(0) scale(.99)}
  .menu-card{padding:16px}

function server(fn){
  var args = Array.prototype.slice.call(arguments,1);
  var ctrl = new AbortController();
  var to = setTimeout(function(){ ctrl.abort(); }, 25000);
  var cab = {};
  if(API_KEY){ cab['Authorization']='Bearer '+API_KEY; cab['apikey']=API_KEY; cab['Content-Type']='application/json'; }
  return fetch(API_URL, { method:'POST', redirect:'follow', signal:ctrl.signal, headers:cab,
    body: JSON.stringify({ action:fn, args:args, token:AUTH.token }) })
  .then(function(r){ clearTimeout(to); return r.json(); })
  .then(function(j){
    if(!j.ok){
      if(j.error==='NAO_AUTENTICADO'){ setConn(true); sessaoExpirada(); throw new Error('Sessão expirada'); }
      throw new Error(j.error || 'Erro no servidor');
    }
    setConn(true); return j.data;
  })
  .catch(function(e){
    clearTimeout(to);
    if(e && e.message==='Sessão expirada'){ throw e; }
    setConn(false);
    var msg = (e && e.name==='AbortError') ? 'Servidor não respondeu (tempo esgotado)' : (e && e.message ? e.message : e);
    toast('Erro: '+msg); throw e;
  });
}
function sessaoExpirada(){ salvarToken(''); AUTH.manejador=null; STATE.manejador=null; toast('Sessão expirada, entre novamente'); STATE.stack=['login']; render(); }
function setConn(ok){ var d=document.getElementById('connDot'); if(!d)return; d.className='dot '+(ok?'on':'off'); d.title=ok?'Conectado':'Sem conexão'; }

function nav(view, push){ if(push!==false) STATE.stack.push(view); render(); }
function voltar(){ STATE.stack.pop(); render(); }
function render(){
  if(CURRENTMAP){ try{ CURRENTMAP.remove(); }catch(e){} CURRENTMAP=null; }
  if(ROUTEMAP){ try{ ROUTEMAP.remove(); }catch(e){} ROUTEMAP=null; }
  if(GEOWATCH!=null){ try{ navigator.geolocation.clearWatch(GEOWATCH); }catch(e){} GEOWATCH=null; }
  var _mm=document.getElementById('markModal'); if(_mm) _mm.classList.remove('open');
  document.body.classList.remove('map-mode');
  var padrao = AUTH.token ? 'inicio' : 'login';
  var view = STATE.stack[STATE.stack.length-1] || padrao;
  var noLogin = (view==='login' || view==='registrar');
  var mostrarVoltar = (STATE.stack.length>1 && !noLogin);
  document.getElementById('btnBack').style.display = mostrarVoltar ? 'block':'none';
  var tb=document.getElementById('tbBack'); if(tb) tb.style.display = mostrarVoltar ? 'block':'none';
  var f=document.getElementById('fab'); f.style.display='none'; f.innerHTML='';
  (VIEWS[view]||VIEWS.login)();
  aplicarFundo(view);
  updateHeader();
  buildSidebar();
}
function updateHeader(){
  var logado = !!AUTH.token;
  var nome = (STATE.tipo==='empresa') ? ((STATE.empresa&&STATE.empresa.nome)||'Empresa') : ((STATE.manejador&&STATE.manejador.nome)||'');
  document.getElementById('hSub').textContent = (logado && nome) ? nome : STATE.appNome;
  document.body.classList.toggle('logged', logado);
  var bell=document.getElementById('hbell'); if(bell) bell.style.display = logado ? 'block':'none';
  var cfg=document.getElementById('hcfg'); if(cfg) cfg.style.display='none';
  if(!logado) closeMenu();
}

  {v:'ranking',   label:'Ranking',           icon:'ranking'}
];
var TOP_KEYS={trofeus:1, ranking:1, promocoes:1, mapaGeral:1};
function buildSidebar(){
  var lg=document.getElementById('sbLogo'); if(lg && lg.getAttribute('src')!==LOGO) lg.src=LOGO;
  var nav=document.getElementById('sbNav'); if(!nav) return;
  var tipo=STATE.tipo||'manejador';
  var root=STATE.stack[0]||(tipo==='empresa'?'empresa':'inicio');
  var lista=(tipo==='empresa')?NAV_LOJISTA.slice():NAV_MANEJADOR.slice();
  lista=lista.filter(function(n){ return !TOP_KEYS[n.v]; });
  if(STATE.admin) lista=lista.concat([{v:'admin',label:'Administração',icon:'admin'}]);
  nav.innerHTML=lista.map(function(n){
    var ic = n.icon ? '<img src="'+ICONS[n.icon]+'" alt="">' : '<span class="emoji">'+n.emoji+'</span>';
    return '<div class="sb-item'+(root===n.v?' active':'')+'" onclick="go(\''+n.v+'\')">'+ic+'<span>'+n.label+'</span></div>';
  }).join('');
  var sv=document.getElementById('sbVer'); if(sv) sv.textContent=APP_VER;
  pintarCampanha();
  var u=document.getElementById('sbUser');
  if(u){ var nome=(tipo==='empresa') ? ((STATE.empresa&&STATE.empresa.nome)||'Empresa') : ((STATE.manejador&&STATE.manejador.nome)||'');
    u.innerHTML = (tipo==='empresa') ? esc(nome) : ('<button class="sbcfg" onclick="go(\'perfilManejador\')" title="Configurar perfil">⚙️</button>'+esc(nome)); }
  buildTopNav(root, tipo);
}
function buildTopNav(root, tipo){
  var tn=document.getElementById('topnav'); if(!tn) return;
  var base=(tipo==='empresa')?NAV_LOJISTA:NAV_MANEJADOR;
  var ordem=['trofeus','ranking','promocoes'];
  var itens=ordem.map(function(k){ return base.filter(function(n){return n.v===k;})[0]; }).filter(function(x){return x;});
  var html=itens.map(function(n){
    var ic = n.icon ? '<img src="'+ICONS[n.icon]+'" alt="">' : '<span class="emoji">'+n.emoji+'</span>';
    return '<div class="tn-item'+(root===n.v?' active':'')+'" onclick="go(\''+n.v+'\')">'+ic+'<span class="lbl">'+n.label+'</span></div>';
  }).join('');
  html += '<div class="tn-item'+(root==='mapaGeral'?' active':'')+'" onclick="go(\'mapaGeral\')"><img src="'+ICONS.network+'" alt=""><span class="lbl">Rede</span></div>';
  html += '<button class="tn-sino" onclick="abrirPromos()" title="Avisos">🔔<span class="hbadge" id="promoBadge"></span></button>';
  tn.innerHTML=html;
  atualizarBadge();
  setTimeout(posicionarMapShell,0);
}

function setCrumb(){ var p=[]; for(var i=0;i<arguments.length;i++) p.push(arguments[i]);

function app(html){ document.getElementById('app').innerHTML=html; }
function aplicarFundo(chave){ try{
  var img = bgPara(chave || (STATE.stack[STATE.stack.length-1]||'inicio'));
  document.body.style.backgroundImage='linear-gradient(rgba(28,36,26,.62),rgba(20,28,18,.72)), url('+img+')';
  document.body.style.backgroundSize='cover';
  document.body.style.backgroundPosition='center';
  document.body.style.backgroundAttachment='fixed';
  document.body.style.backgroundRepeat='no-repeat';
}catch(e){} }
var BGS=[BG1,BG2,BG3];
function bgPara(chave){ var s=0; chave=String(chave||''); for(var i=0;i<chave.length;i++) s=(s*31+chave.charCodeAt(i))%997; return BGS[s%BGS.length]; }
function heroFoto(chave,titulo,texto,tag){
  return '<div class="hero-foto" style="background-image:url('+bgPara(chave)+')"><div class="hf-in">'+
    (tag?'<span class="hf-tag">'+esc(tag)+'</span>':'')+
    '<h2>'+esc(titulo)+'</h2>'+(texto?'<p>'+texto+'</p>':'')+'</div></div>'; }

window.abrirMapaPicker=function(a,b){ PICK_TARGET={a:a,b:b}; PICK_LATLNG=null;
  document.getElementById('mapPicker').classList.add('open');
  var cc=document.getElementById('pickCoord'); if(cc) cc.textContent='Toque no mapa para marcar o ponto';
  setTimeout(function(){ if(PICKMAP){ PICKMAP.remove(); PICKMAP=null; }
    var la=coord(val(a)), ln=coord(val(b)); var ok=ptOk(la,ln); var center=ok?[la,ln]:[-15.78,-47.93], zoom=ok?15:4;
    PICKMAP=L.map('pickMap',{preferCanvas:true}).setView(center,zoom);
    addBase(PICKMAP);
    var marker = ok ? L.marker([la,ln],{draggable:true}).addTo(PICKMAP) : null;
    if(ok){ PICK_LATLNG={lat:la,lng:ln}; marker.on('dragend',function(){ var p=marker.getLatLng(); PICK_LATLNG={lat:p.lat,lng:p.lng}; setPickCoord(); }); }
    PICKMAP.on('click',function(e){ PICK_LATLNG={lat:e.latlng.lat,lng:e.latlng.lng}; if(marker){ marker.setLatLng(e.latlng); } else { marker=L.marker(e.latlng,{draggable:true}).addTo(PICKMAP); marker.on('dragend',function(){ var p=marker.getLatLng(); PICK_LATLNG={lat:p.lat,lng:p.lng}; setPickCoord(); }); } setPickCoord(); });
    setTimeout(function(){ PICKMAP.invalidateSize(); },120);
  },80); };

function pegarGps(a,b,btn){ if(!navigator.geolocation){toast('GPS não suportado');return;} var t=btn.textContent; btn.textContent='📡 Localizando…'; btn.disabled=true;
  navigator.geolocation.getCurrentPosition(function(p){ var ea=document.getElementById(a), eb=document.getElementById(b);
    ea.value=p.coords.latitude.toFixed(6); eb.value=p.coords.longitude.toFixed(6);
    try{ ea.dispatchEvent(new Event('input',{bubbles:true})); eb.dispatchEvent(new Event('input',{bubbles:true})); }catch(e){}
    btn.textContent=t; btn.disabled=false; toast('Localização capturada ✔'); },

/* foto -> dataURL (redimensiona/comprime) */
function bindFoto(inputId,prevId){
  var inp=document.getElementById(inputId), prev=document.getElementById(prevId); inp._data='';
  inp.addEventListener('change',function(){ var f=inp.files[0]; if(!f)return; var r=new FileReader();
    r.onload=function(){ var img=new Image();
      img.onload=function(){ var max=1280,w=img.width,h=img.height; if(w>max||h>max){ if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;} }
        var cv=document.createElement('canvas'); cv.width=w; cv.height=h; cv.getContext('2d').drawImage(img,0,0,w,h);
        try{ inp._data=cv.toDataURL('image/jpeg',0.82); }catch(e){ inp._data=r.result; } prev.src=inp._data; prev.style.display='block'; };
      img.onerror=function(){ inp._data=r.result; prev.src=r.result; prev.style.display='block'; }; img.src=r.result; };
    r.readAsDataURL(f); });
}

/* mini gráfico de barras (SVG) */
function barChart(pairs,opts){ opts=opts||{}; var w=opts.w||250,h=opts.h||95,pad=16;
  if(!pairs.length) return '<div class="meta">Sem dados.</div>';
  var max=Math.max.apply(null,pairs.map(function(p){return p.value;}).concat([1]));
  var gap=(w-pad*2)/pairs.length, bw=gap*0.68;
  var bars=pairs.map(function(p,i){ var bh=(h-pad*2)*(p.value/max); var x=pad+i*gap+(gap-bw)/2, y=h-pad-bh;
    return '<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+Math.max(bh,1).toFixed(1)+'" rx="2" fill="'+(p.color||opts.color||'#3f6b3f')+'"></rect>'+
      '<text x="'+(x+bw/2).toFixed(1)+'" y="'+(h-pad+10)+'" font-size="8" text-anchor="middle" fill="#5c6b58">'+esc(p.label)+'</text>'+
      '<text x="'+(x+bw/2).toFixed(1)+'" y="'+(y-3).toFixed(1)+'" font-size="8" text-anchor="middle" fill="#22301f">'+p.value+'</text>'; }).join('');
  return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" style="max-width:'+w+'px">'+bars+'</svg>'; }
function porMes(abates){ var m={};
  abates.forEach(function(a){ var s=String(a.dataHora||a.dataCadastro||''); var k=s.substring(0,7); if(k) m[k]=(m[k]||0)+1; });
  return Object.keys(m).sort().slice(-6).map(function(k){ var p=k.split('-'); return {label:p[1]+'/'+p[0].substring(2), value:m[k]}; }); }

function iniciarPromoPoll(){
  // Uma única rotina: só busca quando a aba está visível, com intervalo folgado.
  carregarAvisos(); carregarCampanha(); carregarPromos();
  if(PROMO_TIMER) return;
  PROMO_TIMER=setInterval(function(){
    if(document.hidden) return;               // aba em segundo plano não consome servidor
    if(!AUTH.token) return;
    carregarAvisos(); carregarCampanha(); carregarPromos();
  }, 15*60000);                               // 15 min (era 5)
  document.addEventListener('visibilitychange', function(){
    if(!document.hidden && AUTH.token){
      var agora=Date.now();
      if(agora-(window.__ultimaAtualiz||0) > 5*60000){ window.__ultimaAtualiz=agora; carregarAvisos(); carregarCampanha(); }
    }
  });
}

var DEN_TARGET=null;
window.denunciar=function(tipo,id){ DEN_TARGET={tipo:tipo,id:id}; var m=document.getElementById('denMotivo'); if(m) m.value=''; document.getElementById('denModal').classList.add('open'); };
window.fecharDen=function(){ document.getElementById('denModal').classList.remove('open'); };
window.enviarDenuncia=function(btn){ if(!DEN_TARGET)return; btn.disabled=true; btn.textContent='Enviando…';

function netCard(av,nome,sub,cidade,wa,tel,email){ var w=waLink(wa); return '<div class="card"><div class="row" style="align-items:center"><img src="'+esc(av)+'" style="width:46px;height:46px;border-radius:50%;object-fit:cover;flex:none;margin-right:10px;border:1px solid var(--linha)"><div class="grow"><h3 style="font-size:15px">'+esc(nome||'')+'</h3><div class="meta">'+(sub?esc(sub):'')+(cidade?(sub?' · ':'')+esc(cidade):'')+(tel?'<br>📞 '+esc(tel):'')+(email?'<br>✉️ '+esc(email):'')+'</div></div>'+(w?'<a class="btn sm sec" style="width:auto;margin:0;text-decoration:none" target="_blank" href="'+w+'">💬</a>':'')+'</div></div>'; }
VIEWS.perfilManejador=function(){ var me=STATE.manejador||{}; setTitulo('Meu perfil'); setCrumb('Perfil');
  var temCoord=!!((me.latNetwork||me.lat)&&(me.lngNetwork||me.lng));
  app((me.bloqueado==='Sim'?'<div class="card" style="border-left:5px solid #8a3a2c"><div class="meta">🚩 <b>Seu perfil está bloqueado</b> por denúncias e está em análise pelo administrador. Enquanto isso, você não aparece na rede, no mapa nem no ranking.</div></div>':'')+'<div class="card rustic-hero"><div class="row"><img src="'+esc(avatarUrl(me))+'" style="width:66px;height:66px;border-radius:50%;object-fit:cover;border:2px solid #ee8a2e"><div class="grow" style="margin-left:12px"><h2 style="margin:0">'+esc(me.nome||'Manejador')+'</h2><div class="meta">Perfil público na rede</div></div></div></div>'+
    '<div class="card"><label>Foto do perfil '+(me.fotoUrl?'(escolha para trocar)':'(sem foto, usamos um avatar padrão)')+'</label>'+(me.fotoUrl?'<img class="foto-prev" style="display:block;border-radius:50%;width:90px;height:90px;object-fit:cover" src="'+esc(imgSrc(me.fotoUrl))+'">':'')+'<input id="np_foto" type="file" accept="image/*"><img id="np_prev" class="foto-prev">'+
    '<label>Sexo (define seu avatar padrão)</label><select id="np_sexo"><option value="Masculino"'+(String(me.sexo||'').toLowerCase().indexOf('f')!==0?' selected':'')+'>Masculino</option><option value="Feminino"'+(String(me.sexo||'').toLowerCase().indexOf('f')===0?' selected':'')+'>Feminino</option></select>'+
    '<label>WhatsApp (contato)</label><input id="np_wa" value="'+esc(me.whatsapp||'')+'" placeholder="DDD+número">'+
    '<label>Telefone</label><input id="np_tel" value="'+esc(me.telefone||'')+'">'+
    '<label>Cidade / região</label><input id="np_cidade" value="'+esc(me.cidade||'')+'">'+
    '<label>Sobre você</label><textarea id="np_bio" placeholder="Ex: manejo com cães, aberto a parcerias">'+esc(me.bioNetwork||'')+'</textarea>'+
    '<label>Sua localização no mapa *</label><div class="two"><div><input id="np_lat" inputmode="decimal" placeholder="Latitude" value="'+esc(me.latNetwork||me.lat||'')+'"></div><div><input id="np_lng" inputmode="decimal" placeholder="Longitude" value="'+esc(me.lngNetwork||me.lng||'')+'"></div></div>'+
    gpsButton('np_lat','np_lng')+
    '<label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:15px;margin-top:14px"><input type="checkbox" id="np_vis" style="width:auto" '+(me.visivelNetwork==='Sim'?'checked':'')+'> Aparecer no mapa da rede (visível)</label>'+
    '<div class="meta" id="np_hint" style="margin:6px 0 0">⚠️ Só é possível ficar visível com a <b>localização (lat/long) preenchida</b>. Se ficar oculto, você não aparece e também não vê os outros manejadores. Lojistas você vê sempre.</div>'+
    '<button class="btn" onclick="salvarNetwork(this)" style="margin-top:14px">Salvar perfil</button></div>');
  bindFoto('np_foto','np_prev');
  var chk=document.getElementById('np_vis');
  function sync(){ var ok=!!(val('np_lat')&&val('np_lng')); chk.disabled=false; if(!ok) chk.checked=false; var h=document.getElementById('np_hint'); if(h) h.style.display=ok?'none':'block'; }
  ['np_lat','np_lng'].forEach(function(id){ document.getElementById(id).addEventListener('input',sync); });

window.salvarNetwork=function(btn){ 
  var vis=document.getElementById('np_vis').checked;
  if(vis && !(val('np_lat')&&val('np_lng'))){ toast('Preencha a localização (lat/long) para ficar visível'); return; }
  btn.disabled=true; btn.textContent='Salvando…';
  var d={ visivel:vis, whatsapp:val('np_wa'), telefone:val('np_tel'), cidade:val('np_cidade'), bio:val('np_bio'), lat:val('np_lat'), lng:val('np_lng'), sexo:val('np_sexo'), foto:fotoData('np_foto') };
  server('apiSalvarNetwork',d).then(function(r){ var me=STATE.manejador;
    me.visivelNetwork=(r&&r.visivel)?'Sim':'Não'; me.whatsapp=d.whatsapp; me.telefone=d.telefone; me.cidade=d.cidade; me.bioNetwork=d.bio; me.latNetwork=d.lat; me.lngNetwork=d.lng; me.sexo=d.sexo;
    if(r&&r.fotoUrl) me.fotoUrl=r.fotoUrl;
    toast(r&&r.bloqueado?'Salvo. Para ficar visível, preencha a localização.':'Perfil salvo ✔'); STATE.stack=['perfilManejador']; render(); }).catch(function(){ btn.disabled=false; btn.textContent='Salvar perfil'; }); };

/* ============================================================

var PROMOS={ recebe:true, promos:[] };
var PROMO_LIDAS=(function(){ try{ return JSON.parse(localStorage.getItem('promoLidas')||'[]'); }catch(e){ return []; } })();
function salvarLidas(){ try{ localStorage.setItem('promoLidas', JSON.stringify(PROMO_LIDAS)); }catch(e){} }
function isLida(id){ return PROMO_LIDAS.indexOf(id)>=0; }
window.marcarLida=function(id){ if(!isLida(id)){ PROMO_LIDAS.push(id); salvarLidas(); } render(); };
window.desmarcarLida=function(id){ var i=PROMO_LIDAS.indexOf(id); if(i>=0){ PROMO_LIDAS.splice(i,1); salvarLidas(); } render(); };
var INTERESSES=[];
var ALVOS=['Todos','Manejadores','Empresas (todas)','Agricultor','Despachante','Clube de tiro','Loja de artigos de caça'];
function fmtRestante(iso){ var ms=new Date(iso)-new Date(); if(ms<=0) return 'expirada'; var h=Math.floor(ms/3600000), m=Math.floor((ms%3600000)/60000); return (h?h+'h ':'')+m+'min'; }
function carregarPromos(){ if(!AUTH.token) return; server('apiPromocoes').then(function(r){ PROMOS=r||{recebe:true,promos:[]}; }).catch(function(){}); }
var AVISOS=[];
var CAMPANHA=null;
function carregarCampanha(){ if(!AUTH.token) return; server('apiCampanhaAtiva').then(function(c){ CAMPANHA=c||null; pintarCampanha(); }).catch(function(){ CAMPANHA=null; pintarCampanha(); }); }
var CAMP_OCULTA=(function(){ try{ return localStorage.getItem('campOculta')==='1'; }catch(e){ return false; } })();
window.toggleCampanha=function(){ CAMP_OCULTA=!CAMP_OCULTA; try{ localStorage.setItem('campOculta', CAMP_OCULTA?'1':'0'); }catch(e){} pintarCampanha(); };
function pintarCampanha(){ var el=document.getElementById('campPanel'), body=document.getElementById('cpBody'), tg=document.getElementById('cpToggle');
  if(!el||!body) return;
  if(!CAMPANHA || !AUTH.token){ el.className=''; body.innerHTML=''; if(tg) tg.style.display='none'; document.body.classList.remove('camp-on'); return; }
  var c=CAMPANHA;
  el.className='on'+(CAMP_OCULTA?' fechado':'');
  document.body.classList.toggle('camp-on', !CAMP_OCULTA);
  if(tg){ tg.style.display='block'; tg.className='cp-toggle'+(CAMP_OCULTA?' fechado':'');
    tg.textContent = CAMP_OCULTA ? '🏆' : '›';
    tg.title = CAMP_OCULTA ? 'Mostrar campanha' : 'Ocultar campanha'; }
  body.innerHTML='<span class="cp-tag">🏆 Campanha</span>'+
    '<h4>'+esc(c.titulo||'')+'</h4>'+
    (c.descricao?'<p>'+esc(c.descricao)+'</p>':'')+
    (c.patrocinador?'<div class="cp-sep"></div><p>Patrocínio<br><b style="color:#fff;font-size:14px">'+esc(c.patrocinador)+'</b></p>':'')+
    (c.premio?'<span class="cp-premio">🎁 '+esc(c.premio)+'</span>':'')+
    (c.encerraEm?'<span class="cp-time">⏳ encerra em '+fmtRestante(c.encerraEm)+'</span>':''); }
var AVISO_LIDOS=(function(){ try{ return JSON.parse(localStorage.getItem('avisoLidos')||'[]'); }catch(e){ return []; } })();
function salvarAvisoLidos(){ try{ localStorage.setItem('avisoLidos', JSON.stringify(AVISO_LIDOS)); }catch(e){} }
function avisoLido(id){ return AVISO_LIDOS.indexOf(id)>=0; }
window.marcarAvisoLido=function(id){ if(!avisoLido(id)){ AVISO_LIDOS.push(id); salvarAvisoLidos(); } atualizarBadge(); renderPromoPanel(); };
window.desmarcarAvisoLido=function(id){ var i=AVISO_LIDOS.indexOf(id); if(i>=0){ AVISO_LIDOS.splice(i,1); salvarAvisoLidos(); } atualizarBadge(); renderPromoPanel(); };
function carregarAvisos(){ if(!AUTH.token) return; server('apiAvisos').then(function(l){ AVISOS=l||[]; atualizarBadge(); }).catch(function(){}); }
function atualizarBadge(){ var b=document.getElementById('promoBadge'); if(!b) return; var n=AVISOS.filter(function(a){return !avisoLido(a.id);}).length; b.textContent=n; b.classList.toggle('on', n>0); }
window.abrirPromos=function(){ document.getElementById('promoPanel').classList.add('open'); renderPromoPanel(); carregarAvisos(); };
window.fecharPromos=function(){ document.getElementById('promoPanel').classList.remove('open'); };
window.toggleRecebe=function(chk){ server('apiSetRecebePromos', chk.checked).then(function(r){ PROMOS.recebe=r.recebe; if(!r.recebe) PROMOS.promos=[]; if(r.recebe) carregarPromos(); }); };
function avisoCard(a,lido){ var btn = lido ? '<button class="lnk-den" style="color:#6f9a5f;text-decoration:none" onclick="desmarcarAvisoLido(\''+a.id+'\')">↩️ Não lido</button>' : '<button class="btn sm" style="width:auto;margin:0;background:var(--laranja)" onclick="marcarAvisoLido(\''+a.id+'\')">✓ Marcar como lido</button>';
  return '<div class="card"'+(lido?' style="opacity:.7"':'')+'><h3 style="margin:0 0 4px">📢 '+esc(a.titulo||'Aviso')+'</h3><div class="meta" style="white-space:pre-wrap">'+esc(a.mensagem||'')+'</div><div class="meta" style="margin-top:6px;opacity:.75">'+fmtData(a.criadoEm)+' · Administração</div><div class="row" style="margin-top:8px">'+btn+'</div></div>'; }
function renderPromoPanel(){
  var naoLidos=AVISOS.filter(function(a){return !avisoLido(a.id);});
  var lidos=AVISOS.filter(function(a){return avisoLido(a.id);});
  var lista = naoLidos.length? naoLidos.map(function(a){return avisoCard(a,false);}).join('') : '<div class="empty"><div class="big">📭</div>Nenhum aviso novo.</div>';
  var lidosHtml = lidos.length ? ('<details style="margin-top:12px"><summary style="cursor:pointer;font-size:14px;color:var(--txt2)">📁 Lidos ('+lidos.length+')</summary><div style="margin-top:8px">'+lidos.map(function(a){return avisoCard(a,true);}).join('')+'</div></details>') : '';
  document.getElementById('promoPanel').innerHTML='<div class="promo-box"><div class="row"><h3 class="grow" style="margin:0">🔔 Avisos</h3><button class="ib" onclick="fecharPromos()">✕</button></div>'+
    '<div class="meta" style="margin:6px 0 10px">Comunicados da administração. As promoções relâmpago ficam na aba <b>Promoções</b>.</div>'+lista+lidosHtml+'</div>'; }
function promoCard(p,lida){ var readBtn = lida ? '<button class="lnk-den" style="color:#6f9a5f;text-decoration:none" onclick="desmarcarLida(\''+p.id+'\')">↩️ Não lido</button>' : '<button class="btn sm" style="width:auto;margin:0;background:#3a5a34" onclick="marcarLida(\''+p.id+'\')">✓ Marcar como lido</button>';
  return '<div class="card"'+(lida?' style="opacity:.72"':'')+'>'+(p.fotoUrl?'<img src="'+esc(imgSrc(p.fotoUrl))+'" style="width:100%;max-height:180px;object-fit:cover;border-radius:10px;margin-bottom:8px" onclick="verFoto(\''+esc(imgSrc(p.fotoUrl))+'\')">':'')+
  '<h3 style="margin:0 0 2px">📣 '+esc(p.autorNome||'')+'</h3>'+(p.descricao?'<div class="meta">'+esc(p.descricao)+'</div>':'')+
  '<div style="margin-top:6px">'+(p.precoAtual?'<span class="preco-old">R$ '+esc(p.precoAtual)+'</span> ':'')+(p.precoPromo?'<span class="preco-new">R$ '+esc(p.precoPromo)+'</span>':'')+'</div>'+
  '<div class="meta" style="margin-top:4px">'+(p.distKm!=null?'📍 ~'+p.distKm.toFixed(1)+' km · ':'')+'⏳ expira em '+fmtRestante(p.expiraEm)+'</div>'+
  '<div class="row" style="gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap">'+(p.autorId?'<button class="btn sm sec" style="width:auto;margin:0" onclick="verLoja(\''+p.autorId+'\')">🏪 Ver loja</button>':'')+readBtn+'<div class="grow"></div><button class="lnk-den" onclick="denunciar(\'promocao\',\''+p.id+'\')">🚩 Denunciar</button></div></div>'; }
VIEWS.promocoes=function(){ setTitulo('Promoções'); setCrumb('Promoções'); loadingBox('Carregando promoções…');
  var ehEmp=(STATE.tipo==='empresa');
  Promise.all([ server('apiPromocoes'), ehEmp?server('apiPodeLancarPromo'):Promise.resolve(null), ehEmp?Promise.resolve(null):server('apiMeusInteressesPromo').catch(function(){return {interesses:[]};}), ehEmp?server('apiMinhasPromocoes').catch(function(){return [];}):Promise.resolve([]) ])

      return '<div class="card" style="border-left:5px solid var(--laranja)">'+

        '<div class="grow"><span class="hf-tag" style="background:var(--laranja);color:#fff;font-size:10px;padding:3px 9px;border-radius:20px;font-weight:800;letter-spacing:.5px">No ar</span>'+
        '<h3 style="margin:6px 0 2px">'+esc(p.descricao||'Promoção')+'</h3>'+
        '<div>'+(p.precoAtual?'<span class="preco-old">R$ '+esc(p.precoAtual)+'</span> ':'')+(p.precoPromo?'<span class="preco-new">R$ '+esc(p.precoPromo)+'</span>':'')+'</div>'+
        '<div class="meta" style="margin-top:4px">🎯 '+esc(p.alvoPerfil||'Todos')+(p.raioKm?' · 📍 '+esc(p.raioKm)+' km':'')+'</div>'+

    var ctrl = ehEmp ? '' : ('<div class="card"><label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:15px"><input type="checkbox" style="width:auto" '+(PROMOS.recebe!==false?'checked':'')+' onchange="toggleRecebePromo(this)"> Receber promoções</label>'+
      '<details style="margin-top:8px"><summary style="cursor:pointer;font-size:14px;color:var(--txt2)">🏬 Tipos de loja que quero receber</summary><div style="margin-top:8px">'+SEGMENTOS.map(function(s){ return '<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px;margin:4px 0"><input type="checkbox" style="width:auto" value="'+esc(s)+'" '+(INTERESSES.indexOf(s)>=0?'checked':'')+' onchange="toggleInteresse()"> '+esc(s)+'</label>'; }).join('')+'<div class="meta" style="margin-top:4px">Deixe tudo desmarcado para receber de todos.</div></div></details></div>');

    app(hero+minhaHtml+acao+ctrl+tl);

function fmtHora(iso){ try{ var d=new Date(iso); return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2); }catch(e){ return ''; } }
window.toggleRecebePromo=function(chk){ server('apiSetRecebePromos', chk.checked).then(function(){ render(); }); };
window.toggleInteresse=function(){ var sel=[]; document.querySelectorAll('input[type=checkbox][value]').forEach(function(c){ if(c.checked) sel.push(c.value); });

VIEWS.promoForm=function(){ setTitulo('Lançar promoção'); setCrumb('Promoções','Nova');
  app('<div class="card"><label>Foto do produto/serviço</label><input id="pr_foto" type="file" accept="image/*"><img id="pr_prev" class="foto-prev">'+
    '<label>Descrição do produto/serviço *</label><textarea id="pr_desc" placeholder="Ex: Ração para cães 20kg"></textarea>'+

    '<label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-top:4px"><input type="checkbox" id="pr_frete" style="width:auto"> 🚚 Entrega grátis</label>'+
    '<div class="card" style="background:#f3ead2;border:1px solid #e0d4b6;margin-top:8px"><div class="row"><div class="grow">Preço com desconto</div><b id="pr_final" class="preco-new" style="font-size:20px">—</b></div></div>'+
    '<label>Quem deve ver (público-alvo)</label><select id="pr_alvo">'+ALVOS.map(function(a){return '<option>'+a+'</option>';}).join('')+'</select>'+

    '<button class="btn" onclick="salvarPromo(this)">📣 Publicar promoção</button></div>');
  bindFoto('pr_foto','pr_prev'); calcPromo(); raioLbl(); };
function precoDe(id){ return parseFloat((val(id)||'').replace(/[^0-9.,]/g,'').replace(',','.'))||0; }
window.calcPromo=function(){ var pa=precoDe('pr_pa'), d=precoDe('pr_pct'); var f=pa*(1-d/100); var el=document.getElementById('pr_final'); if(el) el.textContent = pa? ('R$ '+(d?f:pa).toFixed(2).replace('.',',')) : '—'; };
window.raioLbl=function(){ var v=parseInt(val('pr_raio')||'0',10); var el=document.getElementById('pr_raio_lbl'); if(el) el.textContent = v>0? (v+' km') : 'Sem limite (qualquer distância)'; };
window.salvarPromo=function(btn){ if(!val('pr_desc')){toast('Descreva o produto/serviço');return;}
  var pa=precoDe('pr_pa'), d=precoDe('pr_pct'); if(!pa){toast('Informe o preço atual');return;}
  var promo=(pa*(1-d/100)).toFixed(2); var raio=parseInt(val('pr_raio')||'0',10);
  var desc=val('pr_desc')+(document.getElementById('pr_frete').checked?' · 🚚 Entrega grátis':'');
  btn.disabled=true; btn.textContent='Publicando…';
  server('apiCriarPromocao',{descricao:desc,precoAtual:pa.toFixed(2),precoPromo:promo,alvoPerfil:val('pr_alvo'),raioKm:raio>0?String(raio):'',foto:fotoData('pr_foto')})
  .then(function(){ toast('Promoção publicada ✔'); STATE.stack=['promocoes']; render(); }).catch(function(e){ btn.disabled=false; btn.textContent='📣 Publicar promoção'; }); };
window.excluirPromo=function(id){ if(!confirm('Encerrar esta promoção?'))return; server('apiExcluirPromocao',id).then(function(){ toast('Promoção encerrada'); render(); }); };

      '<div class="card"><div class="row"><div class="grow"><h3 style="margin:0">Meus troféus</h3></div><button class="btn sm" style="width:auto;margin:0" onclick="nav(\'trofeuForm\')">＋ Adicionar</button></div><div style="margin-top:10px">'+mine+'</div></div>');
  }); };
VIEWS.ranking=function(){ setTitulo('Ranking'); setCrumb('Ranking'); loadingBox('Carregando ranking…');
  server('apiRankingTrofeus').then(function(r){ var pode=r.podeVotar; var ehEmp=(STATE.tipo==='empresa');
    var g = (r.trofeus&&r.trofeus.length)? '<div class="galeria">'+r.trofeus.map(function(t,i){
      var estrelas = (pode && !t.ehMeu) ? estrelasVoto(t.id,t.minhaNota) : ('<div style="margin:6px 8px 8px">'+estrelasRO(t.media)+'</div>');
      return '<div class="trof"><div class="rk">'+(i+1)+'º</div>'+(t.ehMeu?'':'<button class="ib trofden" onclick="denunciar(\'trofeu\',\''+t.id+'\')" title="Denunciar">🚩</button>')+'<img src="'+esc(imgSrc(t.fotoUrl))+'" onclick="verFoto(\''+esc(imgSrc(t.fotoUrl))+'\')"><div class="tt">'+esc(t.autorNome||'')+(t.titulo?' · '+esc(t.titulo):'')+'<br>'+estrelasRO(t.media)+' <span class="vc">('+t.votos+')</span>'+(t.saiEm?'<br><span class="sai">⏳ sai em '+fmtRestante(t.saiEm)+'</span>':'')+'</div>'+estrelas+'</div>'; }).join('')+'</div>' : '<div class="empty"><div class="big">🏅</div>Nenhum troféu no ranking agora.</div>';
    var aviso = ehEmp ? '<div class="meta">Você pode ver o ranking; a avaliação é feita pelos manejadores.</div>'

    app(heroFoto('ranking','Ranking de troféus','Os melhores das últimas 24 horas — o mais bem avaliado no topo.','Ranking')+aviso+'<div class="card">'+g+'</div>');
  }); };
VIEWS.trofeuForm=function(){ setTitulo('Adicionar troféu'); setCrumb('Sala de troféu','Novo');
  app('<div class="card"><label>Foto do troféu *</label><input id="tf_foto" type="file" accept="image/*"><img id="tf_prev" class="foto-prev">'+
    '<label>Título (opcional)</label><input id="tf_tit" placeholder="Ex: Javali 90kg, 2024">'+
    '<button class="btn" onclick="salvarTrofeu(this)">Adicionar à sala</button></div>'); bindFoto('tf_foto','tf_prev'); };
window.salvarTrofeu=function(btn){ if(!fotoData('tf_foto')){toast('Escolha uma foto');return;} btn.disabled=true; btn.textContent='Enviando…';
  server('apiAddTrofeu',{foto:fotoData('tf_foto'),titulo:val('tf_tit')}).then(function(){ toast('Troféu adicionado ✔'); STATE.stack=['trofeus']; render(); }).catch(function(){ btn.disabled=false; btn.textContent='Adicionar à sala'; }); };
window.excluirTrofeu=function(id){ if(!confirm('Remover este troféu?'))return; server('apiExcluirTrofeu',id).then(function(){ toast('Removido'); render(); }); };
window.toggleSala=function(chk){ server('apiSetSalaVisivel',chk.checked).then(function(){ render(); }); };
function estrelasRO(media){ media=parseFloat(media)||0; var full=Math.round(media); var s=''; for(var i=1;i<=5;i++) s+='<span class="star'+(i<=full?' on':'')+'">★</span>'; return '<span class="stars ro" title="'+media.toFixed(1)+'">'+s+'</span>'; }
function estrelasVoto(id,minha){ minha=parseInt(minha,10)||0; var s=''; for(var i=1;i<=5;i++) s+='<span class="star'+(i<=minha?' on':'')+'" onclick="avaliarTrofeu(\''+id+'\','+i+',this)">★</span>'; return '<div class="stars vote">'+s+'</div>'; }
window.avaliarTrofeu=function(id,nota,el){ var cont=el.parentNode; var stars=cont.querySelectorAll('.star');
  server('apiAvaliarTrofeu',id,nota).then(function(r){ stars.forEach(function(st,i){ st.classList.toggle('on',(i+1)<=r.minhaNota); });
    var trof=cont.parentNode; if(trof){ var ro=trof.querySelector('.stars.ro'); if(ro){ var full=Math.round(r.media); ro.querySelectorAll('.star').forEach(function(st,i){ st.classList.toggle('on',(i+1)<=full); }); } var vc=trof.querySelector('.vc'); if(vc) vc.textContent='('+r.votos+')'; }
    toast('Nota: '+r.minhaNota+'★'); }).catch(function(e){ toast((e&&e.message)||'Erro ao avaliar'); }); };

};

function distMetros(a,b){ var R=6371000, r=Math.PI/180;
  var dLa=(b.lat-a.lat)*r, dLn=(b.lng-a.lng)*r, la1=a.lat*r, la2=b.lat*r;
  var x=Math.sin(dLa/2)*Math.sin(dLa/2)+Math.cos(la1)*Math.cos(la2)*Math.sin(dLn/2)*Math.sin(dLn/2);
  return 2*R*Math.asin(Math.min(1,Math.sqrt(x))); }
function fmtDist(m){ m=m||0; return m<1000 ? Math.round(m)+' m' : (m/1000).toFixed(2)+' km'; }
function fmtDur(ms){ var s=Math.floor(ms/1000), mm=Math.floor(s/60), ss=s%60, hh=Math.floor(mm/60); mm=mm%60;
  return (hh?hh+'h ':'')+mm+'min '+(ss<10?'0':'')+ss+'s'; }
function simplificar(pts,max){ max=max||800; if(!pts||pts.length<=max) return pts||[]; var step=pts.length/max, out=[]; for(var i=0;i<pts.length;i+=step) out.push(pts[Math.floor(i)]); out.push(pts[pts.length-1]); return out; }

function iniciarWatchGravacao(){ if(GEOWATCH!=null) return;

    var p={ lat:+pos.coords.latitude.toFixed(6), lng:+pos.coords.longitude.toFixed(6), t:Date.now() };
    LASTPOS={lat:pos.coords.latitude,lng:pos.coords.longitude};
    var last=ROTA_REC.pontos[ROTA_REC.pontos.length-1];
    if(last){ var dd=distMetros(last,p); if(dd<3) { atualizarRecUI(p); return; } ROTA_REC.distancia+=dd; }
    ROTA_REC.pontos.push(p);
    if(ROUTEMAP&&ROTA_REC._poly){ ROTA_REC._poly.addLatLng([p.lat,p.lng]); ROUTEMAP.setView([p.lat,p.lng],ROUTEMAP.getZoom()<14?16:ROUTEMAP.getZoom());
      if(ROTA_REC._me) ROTA_REC._me.setLatLng([p.lat,p.lng]); else ROTA_REC._me=L.marker([p.lat,p.lng],{icon:emojiIcon(iconeTransp(ROTA_REC.tipoTransporte),30)}).addTo(ROUTEMAP); }
    atualizarRecUI(p);
  }, function(err){ toast('GPS: '+err.message); }, {enableHighAccuracy:true,maximumAge:1000,timeout:20000}); }
function atualizarRecUI(p){ var e;
  if(e=document.getElementById('recDist')) e.textContent=fmtDist(ROTA_REC.distancia);
  if(e=document.getElementById('recPts')) e.textContent=ROTA_REC.pontos.length;
  if(e=document.getElementById('recDur')) e.textContent=fmtDur(Date.now()-(ROTA_REC.inicio||Date.now()));

window.pararRota=function(btn){ if((ROTA_REC.pontos||[]).length<2){ toast('Rota muito curta — ande um pouco mais'); return; }

VIEWS.rotaGuia=function(){ var r=ROTA_GUIA; if(!r||!(r.pontos||[]).length){ STATE.stack=['espreita','rotas']; render(); return; }

  server('apiListarMarcacoes',r.id).then(function(ms){ CACHE.marcacao=ms; (ms||[]).forEach(function(m){ var la=coord(m.lat),ln=coord(m.lng); if(!ptOk(la,ln))return; L.marker([la,ln],{icon:emojiIcon(iconeMarca(m.tipo))}).addTo(ROTA_GUIA._markLayer).bindPopup(marcaPopup(m)); }); }).catch(function(){});

    map.panTo([cur.lat,cur.lng]);
    var best=Infinity, idx=0;
    for(var i=0;i<r.pontos.length;i++){ var dd=distMetros(cur,r.pontos[i]); if(dd<best){best=dd; idx=i;} }
    var rem=0; for(var j=idx;j<r.pontos.length-1;j++) rem+=distMetros(r.pontos[j],r.pontos[j+1]);
    var e;

window.salvarMarcacao=function(btn){ if(!MARKPOS){ toast('Sem posição'); return; }

  .then(function(m){ if(ROUTEMAP&&ROTA_GUIA&&ROTA_GUIA._markLayer) L.marker([coord(m.lat),coord(m.lng)],{icon:emojiIcon(iconeMarca(m.tipo))}).addTo(ROTA_GUIA._markLayer).bindPopup(marcaPopup(m));

function desenhoAdd(lat,lng){ if(!DRAW)return; DRAW.pontos.push({lat:+lat.toFixed(6),lng:+lng.toFixed(6)}); redrawDesenho(); }
