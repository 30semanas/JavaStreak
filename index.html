function rotuloManejo(t){ return {'Espera':'Espera (com ceva)','Cães':'Meu canil','Espreita':'Rotas de manejo','Armadilha':'Armadilha'}[t]||t; }
function renderAbateCtx(){ var t=val('ab_tipo'), el=document.getElementById('abateCtx'); if(!el) return; var h='';
  if(t==='Espera'){
    h='<label>Ceva *</label><select id="ab_ceva" onchange="carregarAlimentosCeva()"><option value="">Selecione…</option>'+
      ABATEOPTS.cevas.map(function(c){return '<option value="'+c.id+'">'+esc(c.nome||'Ceva')+'</option>';}).join('')+'</select>'+
      '<label>Alimento na ceva</label><select id="ab_alim"><option value="">—</option></select>';
  } else if(t==='Cães'){
    h='<label>Matilha (canil) *</label><select id="ab_canil" onchange="renderCaesDaMatilha()"><option value="">Selecione…</option>'+
      (ABATEOPTS.canis||[]).map(function(k){return '<option value="'+k.id+'">'+esc(k.nome||'Canil')+'</option>';}).join('')+'</select>'+
      '<label>Cães na caçada *</label><div class="checks" id="ab_caes"><div class="meta">Selecione a matilha acima para listar os cães.</div></div>';
  } else if(t==='Espreita'){
    h='<label>Rota de manejo *</label><select id="ab_rota"><option value="">Selecione…</option>'+
      (ABATEOPTS.rotas||[]).map(function(r){return '<option value="'+r.id+'">'+esc(r.nome||'Rota')+(r.propriedade?' - '+esc(r.propriedade):'')+'</option>';}).join('')+'</select>';
  } else if(t==='Armadilha'){
    h='<label>Armadilha *</label><select id="ab_arm"><option value="">Selecione…</option>'+
      ABATEOPTS.armadilhas.map(function(a){return '<option value="'+a.id+'">'+esc(a.tipo)+'</option>';}).join('')+'</select>';
  }
  el.innerHTML=h;
  // prefill contexto em edição
  if(EDIT){ if(t==='Espera'){ setVal('ab_ceva',EDIT.cevaId); if(EDIT.cevaId) carregarAlimentosCeva(EDIT.alimentoId); }
    if(t==='Espreita') setVal('ab_rota',EDIT.rotaId);
    if(t==='Armadilha') setVal('ab_arm',EDIT.armadilhaId);
    if(t==='Cães'){ setVal('ab_canil',EDIT.canilId||''); renderCaesDaMatilha(EDIT.caesIds?String(EDIT.caesIds).split(','):[]); } }
}
window.renderCaesDaMatilha=function(preIds){ var cid=val('ab_canil'); var box=document.getElementById('ab_caes'); if(!box) return;
  var caes=(ABATEOPTS.caes||[]).filter(function(c){return String(c.canilId)===String(cid);});
  box.innerHTML = (!cid)? '<div class="meta">Selecione a matilha acima para listar os cães.</div>'
    : (caes.length? caes.map(function(c){return '<label class="check" onclick="toggleCheck(this)"><input type="checkbox" value="'+c.id+'">'+esc(c.nome)+' <span class="meta">('+esc(c.funcao||'')+')</span></label>';}).join('') : '<div class="meta">Nenhum cão neste canil.</div>');
  if(preIds && preIds.length){ [].slice.call(document.querySelectorAll('#ab_caes input')).forEach(function(inp){ if(preIds.indexOf(inp.value)>=0){ inp.checked=true; inp.parentNode.classList.add('on'); } }); } };
window.toggleCheck=function(l){ var c=l.querySelector('input'); c.checked=!c.checked; l.classList.toggle('on',c.checked); };
window.carregarAlimentosCeva=function(preselect){ var cid=val('ab_ceva'); var sel=document.getElementById('ab_alim'); if(!sel) return;
  // copia coords da ceva
  var ceva=ABATEOPTS.cevas.filter(function(c){return c.id===cid;})[0];
  if(ceva && !val('ab_lat')){ setVal('ab_lat',ceva.lat); setVal('ab_lng',ceva.lng); }
  if(!cid){ sel.innerHTML='<option value="">—</option>'; return; }
  server('apiListarAlimentos',cid).then(function(l){ sel.innerHTML='<option value="">—</option>'+l.map(function(a){return '<option value="'+a.id+'">'+esc(a.tipo)+' ('+fmtData(a.data)+')</option>';}).join(''); if(preselect) setVal('ab_alim',preselect); }); };
window.salvarAbate=function(btn){ var tipo=val('ab_tipo'); var d={ tipoManejo:tipo, dataHora:val('ab_dh'), quantidade:val('ab_qtd'), sexo:val('ab_sexo'), pesoAprox:val('ab_peso'), lat:val('ab_lat'), lng:val('ab_lng'), obs:val('ab_obs') };
  if(tipo==='Espera'){ d.cevaId=val('ab_ceva'); d.alimentoId=val('ab_alim'); if(!d.cevaId){toast('Selecione a ceva');return;} }
  if(tipo==='Espreita'){ d.rotaId=val('ab_rota'); if(!d.rotaId){toast('Selecione a rota de manejo');return;} }
  if(tipo==='Armadilha'){ d.armadilhaId=val('ab_arm'); if(!d.armadilhaId){toast('Selecione a armadilha');return;} }
  if(tipo==='Cães'){ d.canilId=val('ab_canil'); if(!d.canilId){toast('Selecione a matilha (canil)');return;} var ids=[].slice.call(document.querySelectorAll('#ab_caes input:checked')).map(function(c){return c.value;}); if(!ids.length){toast('Selecione ao menos 1 cão da matilha');return;} d.caesIds=ids.join(','); }
  if(!d.dataHora){toast('Informe data e hora');return;}
  btn.disabled=true; btn.textContent='Salvando…';
  if(EDIT){ server('apiEditar','abate',EDIT.id,{tipoManejo:d.tipoManejo,dataHora:d.dataHora,quantidade:d.quantidade,sexo:d.sexo,pesoAprox:d.pesoAprox,lat:d.lat,lng:d.lng,obs:d.obs,cevaId:d.cevaId||'',alimentoId:d.alimentoId||'',caesIds:d.caesIds||'',canilId:d.canilId||'',rotaId:d.rotaId||'',armadilhaId:d.armadilhaId||'',foto:fotoData('ab_foto')}).then(function(){ EDIT=null; toast('Abate salvo ✔'); voltar(); }).catch(function(){ btn.disabled=false; btn.textContent='Salvar alterações'; }); }
  else { d.foto=fotoData('ab_foto'); server('apiCriarAbate',d).then(function(){ toast('Abate registrado ✔'); voltar(); }).catch(function(){ btn.disabled=false; btn.textContent='Registrar abate'; }); } };

/* ============================================================
   AGENDA DE SAÚDE (cães + cavalos) — com calendário
   ============================================================ */
function diaHoje(){ return new Date().toISOString().substring(0,10); }
function statusProx(prox){ if(!prox) return ''; var p=String(prox).substring(0,10), h=diaHoje(); return p<h?'atrasada':(p===h?'hoje':'proxima'); }
function pad2(n){ return (n<10?'0':'')+n; }
var AGENDA=null, AG_MES=null, AG_DIA=null;

VIEWS.agenda=function(){ setTitulo('Agenda'); setCrumb('Manejo','Agenda'); loadingBox('Carregando agenda…');
  server('apiAgenda').then(function(itens){ AGENDA=itens;
    if(!AG_MES){ var h=new Date(); AG_MES=new Date(h.getFullYear(),h.getMonth(),1); }
    renderAgenda();
  }); };

window.agMes=function(delta){ AG_MES=new Date(AG_MES.getFullYear(),AG_MES.getMonth()+delta,1); AG_DIA=null; renderAgenda(); };
window.agDia=function(k){ AG_DIA=(AG_DIA===k?null:k); renderAgenda(); };

function agItemHtml(i){ var ent=i.escopo==='cao'?'saude':(i.escopo==='cavalo'?'saudeTransp':'manutencao'); var ic=i.escopo==='cao'?'🐕':(i.escopo==='cavalo'?'🐎':'🚗');
  var st=statusProx(i.proximaData); var pill=st==='atrasada'?'<span class="pill dan">Atrasada</span>':(st==='hoje'?'<span class="pill warn">Hoje</span>':(st==='proxima'?'<span class="pill ok">Agendada</span>':''));
  var del = i.fixo ? '' : '<button class="ib" onclick="delItem(\''+ent+'\',\''+i.id+'\')" title="Excluir">🗑️</button>';
  return '<div class="card"><div class="row"><div class="grow"><h3 style="font-size:15px">'+ic+' '+esc(i.animalNome||'')+' — <span class="pill gray">'+esc(i.tipo)+'</span> '+esc(i.descricao||'')+'</h3>'+
    '<div class="meta">'+(i.proximaData?'Próxima: <b>'+fmtData(i.proximaData)+'</b> '+pill:'Feito em '+fmtData(i.data))+(i.obs?'<br>'+esc(i.obs):'')+'</div></div>'+del+'</div></div>'; }

function calendario(itens){
  var y=AG_MES.getFullYear(), m=AG_MES.getMonth(), hoje=diaHoje();
  var inicio=new Date(y,m,1).getDay(), diasNoMes=new Date(y,m+1,0).getDate();
  var byDay={};
  itens.forEach(function(i){
    if(i.proximaData){ var k=String(i.proximaData).substring(0,10); byDay[k]=byDay[k]||{ag:0,re:0,atr:0}; byDay[k].ag++; if(k<hoje) byDay[k].atr++; }
    if(i.data){ var k2=String(i.data).substring(0,10); byDay[k2]=byDay[k2]||{ag:0,re:0,atr:0}; byDay[k2].re++; }
  });
  var nomes=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  var head='<div class="calhead"><button class="ib" onclick="agMes(-1)">‹</button><b>'+nomes[m]+' '+y+'</b><button class="ib" onclick="agMes(1)">›</button></div>';
  var wd=['D','S','T','Q','Q','S','S'].map(function(d){return '<div class="cwd">'+d+'</div>';}).join('');
  var cells=''; for(var i=0;i<inicio;i++) cells+='<div class="cday empty"></div>';
  for(var dia=1;dia<=diasNoMes;dia++){ var k=y+'-'+pad2(m+1)+'-'+pad2(dia); var ev=byDay[k]; var cls='cday';
    if(k===hoje) cls+=' hoje'; if(AG_DIA===k) cls+=' sel';
    var dot=''; if(ev){ cls+=' tem'; var cor= ev.atr? 'var(--danger)' : (ev.ag? 'var(--ok)' : '#98a08f'); dot='<span class="cdot" style="background:'+cor+'"></span>'; }
    cells+='<div class="'+cls+'" onclick="agDia(\''+k+'\')">'+dia+dot+'</div>'; }
  var leg='<div class="legend" style="margin-top:8px"><span><i style="background:var(--danger)"></i>atrasado</span><span><i style="background:var(--ok)"></i>agendado</span><span><i style="background:#98a08f"></i>realizado</span></div>';
  return '<div class="cal">'+head+'<div class="cgrid">'+wd+cells+'</div>'+leg+'</div>';
}

function renderAgenda(){ var itens=AGENDA||[];
  if(!itens.length){ app('<div class="empty"><div class="big">📅</div>Nada na agenda ainda.<br>Registre vacinas e retornos nos cães (na ficha de cada cão) e nos cavalos (no detalhe do transporte).</div>'); return; }
  var h=diaHoje();
  var atrasadas=itens.filter(function(i){return i.proximaData && String(i.proximaData).substring(0,10)<h;}).sort(function(a,b){return String(a.proximaData).localeCompare(String(b.proximaData));});
  var em30=itens.filter(function(i){return i.proximaData && String(i.proximaData).substring(0,10)>=h && (new Date(String(i.proximaData).substring(0,10))-new Date(h))/864e5<=30;}).length;
  var html=calendario(itens);
  html+='<div class="dash"><div class="kpi"><b style="color:var(--danger)">'+atrasadas.length+'</b><span>atrasadas</span></div><div class="kpi"><b>'+em30+'</b><span>próx. 30 dias</span></div><div class="kpi"><b>'+itens.length+'</b><span>registros</span></div></div>';
  if(AG_DIA){
    var doDia=itens.filter(function(i){ return (i.proximaData&&String(i.proximaData).substring(0,10)===AG_DIA) || (i.data&&String(i.data).substring(0,10)===AG_DIA); });
    html+='<div class="row" style="margin:4px 4px 8px"><h3 style="margin:0" class="grow">📆 '+fmtData(AG_DIA)+'</h3><button class="btn sm sec" onclick="agDia(\''+AG_DIA+'\')">Ver tudo</button></div>';
    html+= doDia.length? doDia.map(agItemHtml).join('') : '<div class="empty">Nenhum evento neste dia.</div>';
  } else {
    var proximas=itens.filter(function(i){return i.proximaData && String(i.proximaData).substring(0,10)>=h;}).sort(function(a,b){return String(a.proximaData).localeCompare(String(b.proximaData));});
    var semData=itens.filter(function(i){return !i.proximaData;}).sort(function(a,b){return String(b.data).localeCompare(String(a.data));}).slice(0,20);
    if(atrasadas.length) html+='<h3 style="margin:8px 4px;color:var(--danger)">⚠️ Atrasadas</h3>'+atrasadas.map(agItemHtml).join('');
    if(proximas.length) html+='<h3 style="margin:8px 4px">📌 Próximas</h3>'+proximas.map(agItemHtml).join('');
    if(semData.length) html+='<h3 style="margin:8px 4px;color:var(--txt2)">Histórico recente</h3>'+semData.map(agItemHtml).join('');
  }
  app(html);
}

/* ============================================================
   MAPA (tela cheia, lado direito) com filtro e resumo
   ============================================================ */
var CURRENTMAP=null, MAPDATA=null, MAPLAYER=null;
var MAPFILTER={ espera:true, armadilha:true, busca:true, rede:true };
var NETDATA=null;
function coord(x){ if(x==null) return null; var n=parseFloat(String(x).replace(',','.')); return isNaN(n)?null:n; }
function addBase(map, def){
  var ruas=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'});
  var relevo=L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',{maxZoom:17,attribution:'© OpenTopoMap'});
  var sat=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19,attribution:'Imagery © Esri'});
  var layers={'🗺️ Ruas':ruas,'⛰️ Relevo':relevo,'🛰️ Satélite':sat};
  ((def==='relevo'?relevo:(def==='sat'?sat:ruas))).addTo(map);
  L.control.layers(layers,null,{position:'topright',collapsed:true}).addTo(map);
  return layers;
}
function ptOk(la,ln){ return la!=null&&ln!=null&&la>=-90&&la<=90&&ln>=-180&&ln<=180&&!(la===0&&ln===0); }

VIEWS.mapaGeral=function(){ setTitulo('Mapa'); document.getElementById('crumb').innerHTML=''; app('');
  document.body.classList.add('map-mode'); posicionarMapShell();
  document.getElementById('mapBar').innerHTML=''; document.getElementById('mapPanel').classList.remove('open'); document.getElementById('mapPanel').innerHTML=''; document.getElementById('cevaPanel').classList.remove('open'); document.getElementById('cevaPanel').innerHTML=''; document.getElementById('mapCount').textContent='Carregando…';
  server('apiMapaDados').catch(function(){ return {cevas:[],abates:[],armadilhas:[],transportes:[],caes:[],rotas:[],marcacoes:[],ultimoAlimento:{}}; }).then(function(d){
    server('apiNetworkMapa').then(function(n){ NETDATA=n; desenharMapa(); }).catch(function(){ NETDATA=null; });
    d._cevaN={}; d.cevas.forEach(function(c){d._cevaN[c.id]=c.nome;});
    d._transN={}; d.transportes.forEach(function(t){d._transN[t.id]=t.tipo+(t.identificacao?' - '+t.identificacao:'');});
    d._armN={}; d.armadilhas.forEach(function(a){d._armN[a.id]=a.tipo;});
    d._caoN={}; (d.caes||[]).forEach(function(c){d._caoN[c.id]=c.nome;});
    MAPDATA=d;
    if(CURRENTMAP){ try{CURRENTMAP.remove();}catch(e){} CURRENTMAP=null; }
    var map=L.map('map',{zoomControl:false,preferCanvas:true,zoomAnimation:false,markerZoomAnimation:false,fadeAnimation:false,minZoom:3,maxZoom:19,worldCopyJump:false}).setView([-15.78,-47.93],4);
    L.control.zoom({position:'topright'}).addTo(map);
    addBase(map);
    CURRENTMAP=map; MAPLAYER=L.featureGroup().addTo(map);
    buildMapBar(); buildMapPanel();
    map.whenReady(function(){ map.invalidateSize(); });
    setTimeout(function(){ map.invalidateSize(); desenharMapa(); },180);
    setTimeout(function(){ if(CURRENTMAP===map){ try{map.invalidateSize();}catch(e){} } },600);
  }).catch(function(){ document.getElementById('mapCount').textContent='Falha ao carregar'; }); };

function posicionarMapShell(){ var s=document.getElementById('mapshell'), t=document.getElementById('topnav');
  if(!s) return;
  var topo=0;
  if(t && getComputedStyle(t).display!=='none'){ var r=t.getBoundingClientRect(); topo=r.bottom + (window.scrollY||0); }
  else { var h=document.querySelector('header'); topo=h?h.offsetHeight:56; }
  s.style.top=Math.max(0,Math.round(topo))+'px'; }
window.addEventListener('resize', function(){ if(document.body.classList.contains('map-mode')){ posicionarMapShell(); if(CURRENTMAP){ try{CURRENTMAP.invalidateSize();}catch(e){} } } });

function chipsFiltro(){
  var defs=[ ['espera','🌽 Espera','#b8863b'], ['armadilha','🪤 Armadilha','#b23b3b'], ['busca','🧭 Rotas de manejo','#3b6ea5'], ['rede','🌐 Rede','#e8552b'] ];
  return defs.map(function(x){ return '<span class="chip'+(MAPFILTER[x[0]]?' on':'')+'" onclick="toggleFiltro(\''+x[0]+'\')"><i style="background:'+x[2]+'"></i>'+x[1]+'</span>'; }).join('');
}
function buildMapBar(){ var b=document.getElementById('mapBar'); if(!b) return;
  var perfil='';
  if(STATE.tipo!=='empresa' && STATE.manejador){ var vis=(STATE.manejador.visivelNetwork==='Sim');
    perfil='<span class="chip'+(vis?' on':'')+'" onclick="go(\'perfilManejador\')" title="Configurar meu perfil na rede">'+(vis?'👁️ Visível na rede':'🔒 Oculto na rede')+'</span>'; }
  b.innerHTML='<span class="chip" onclick="togglePainel()" style="font-weight:700">📊 Resumo</span>'+chipsFiltro()+perfil+
    '<span class="chip busca-chip"><input id="mapBusca" placeholder="🔎 Buscar amigo ou loja" oninput="buscarNoMapa(this.value)" autocomplete="off"><div id="mapBuscaRes"></div></span>'; }
window.toggleFiltro=function(k){ MAPFILTER[k]=!MAPFILTER[k]; buildMapBar(); desenharMapa(); };
window.buscarNoMapa=function(q){ var box=document.getElementById('mapBuscaRes'); if(!box) return;
  q=String(q||'').trim().toLowerCase();
  if(q.length<2 || !NETDATA){ box.innerHTML=''; box.classList.remove('on'); return; }
  var itens=[];
  (NETDATA.manejadores||[]).forEach(function(m){ if(!m.eu && String(m.nome||'').toLowerCase().indexOf(q)>=0) itens.push({tipo:'m',o:m}); });
  (NETDATA.empresas||[]).forEach(function(e){ if(String(e.nome||'').toLowerCase().indexOf(q)>=0) itens.push({tipo:'e',o:e}); });
  itens=itens.slice(0,6);
  box.innerHTML = itens.length ? itens.map(function(it){ var o=it.o;
    return '<div class="bres" onclick="irPara(\''+it.tipo+'\',\''+o.id+'\')"><img src="'+esc(avatarUrl(it.tipo==='e'?{tipo:'empresa',fotoUrl:o.fotoUrl}:o))+'"><div><b>'+esc(o.nome||'')+'</b><br><span>'+(it.tipo==='e'?'Loja':'Manejador')+(o.cidade?' · '+esc(o.cidade):'')+'</span></div></div>'; }).join('')
    : '<div class="bres"><div><span>Nada encontrado</span></div></div>';
  box.classList.add('on'); };
window.irPara=function(tipo,id){ if(!NETDATA||!CURRENTMAP) return;
  var lista = tipo==='e' ? (NETDATA.empresas||[]) : (NETDATA.manejadores||[]);
  var o = lista.filter(function(x){return String(x.id)===String(id);})[0]; if(!o) return;
  var la=coord(o.lat), ln=coord(o.lng); if(!ptOk(la,ln)){ toast('Sem localização no mapa'); return; }
  if(!MAPFILTER.rede){ MAPFILTER.rede=true; buildMapBar(); desenharMapa(); }
  CURRENTMAP.setView([la,ln],14);
  var pop = tipo==='e' ? netPopEmpresa(o) : netPopManej(o);
  L.popup({maxWidth:280}).setLatLng([la,ln]).setContent(pop).openOn(CURRENTMAP);
  var box=document.getElementById('mapBuscaRes'); if(box){ box.innerHTML=''; box.classList.remove('on'); }
  var inp=document.getElementById('mapBusca'); if(inp) inp.value=''; };
window.togglePainel=function(){ var p=document.getElementById('mapPanel'); if(p) p.classList.toggle('open'); };

function buildMapPanel(){ var p=document.getElementById('mapPanel'); if(!p||!MAPDATA) return; var d=MAPDATA, ab=d.abates;
  var porTipo={}; ab.forEach(function(a){ porTipo[a.tipoManejo]=(porTipo[a.tipoManejo]||0)+1; });
  var bars=TIPOS_MANEJO.map(function(t){ return {label:t.substring(0,4), value:porTipo[t]||0, color:TIPO_COR[t]}; });
  var animais=ab.reduce(function(s,a){return s+(parseInt(a.quantidade,10)||0);},0);
  var comGps=ab.filter(function(a){return coord(a.lat)!=null&&coord(a.lng)!=null;}).length;
  var leg=TIPOS_MANEJO.map(function(t){return '<span><i style="background:'+TIPO_COR[t]+'"></i>'+rotuloManejo(t)+'</span>';}).join('');
  p.innerHTML='<div class="row"><h3 class="grow" style="margin:0">📊 Resumo dos abates</h3><button class="ib" onclick="togglePainel()">✕</button></div>'+
    '<div class="dash" style="margin-top:8px"><div class="kpi"><b>'+animais+'</b><span>animais abatidos</span></div><div class="kpi"><b>'+comGps+'</b><span>no mapa</span></div></div>'+
    '<h4>Por tipo de manejo</h4>'+barChart(bars,{w:280,h:100})+
    '<h4>Por mês</h4>'+barChart(porMes(ab),{w:280,h:100,color:'#3f6b3f'})+
    '<div class="legend" style="margin-top:8px">'+leg+'</div>'; }

function desenharMapa(){ if(!CURRENTMAP||!MAPDATA) return; var d=MAPDATA; MAPLAYER.clearLayers(); var pts=[];
  function add(m,la,ln){ m.addTo(MAPLAYER); pts.push([la,ln]); }
  if(MAPFILTER.espera) d.cevas.forEach(function(c){ var la=coord(c.lat),ln=coord(c.lng); if(!ptOk(la,ln))return;
    var abs=d.abates.filter(function(a){return a.cevaId===c.id;}), al=d.ultimoAlimento[c.id];
    var pop='<div class="pop"><h4>🌽 '+esc(c.nome||'Ceva')+'</h4><div class="meta"><b>Tipo:</b> '+esc(c.tipo||'—')+'<br><b>Alimento:</b> '+(al?esc(al.tipo)+' ('+fmtData(al.data)+')':'—')+'<br><b>Abates aqui:</b> '+abs.length+'</div>'+(c.fotoUrl?'<img src="'+esc(imgSrc(c.fotoUrl))+'" style="width:100%;border-radius:8px;margin-top:6px">':'')+'<button class="btn sm" style="margin-top:8px" onclick="abrirCevaTimeline(\''+c.id+'\')">📈 Linha do tempo</button></div>';
    var mk=L.circleMarker([la,ln],{radius:13,color:'#5c421c',fillColor:'#b8863b',fillOpacity:.95,weight:3}).bindPopup(pop);
    mk.on('dblclick',function(){ abrirCevaTimeline(c.id); });
    add(mk,la,ln); });
  if(MAPFILTER.armadilha) d.armadilhas.forEach(function(a){ var la=coord(a.lat),ln=coord(a.lng); if(!ptOk(la,ln))return;
    var pop='<div class="pop"><h4>🪤 '+esc(a.tipo)+'</h4><div class="meta"><b>Status:</b> '+esc(a.status||'—')+(a.obs?'<br>'+esc(a.obs):'')+'</div></div>';
    add(L.circleMarker([la,ln],{radius:8,color:'#7a2a2a',fillColor:'#b23b3b',fillOpacity:.9,weight:2}).bindPopup(pop),la,ln); });
  if(MAPFILTER.busca){
    (d.rotas||[]).forEach(function(r){ var line=(r.pontos||[]).map(function(p){return [coord(p.lat),coord(p.lng)];}).filter(function(xy){return ptOk(xy[0],xy[1]);});
      if(line.length>1){ L.polyline(line,{color:'#3b6ea5',weight:4,opacity:.85}).addTo(MAPLAYER); line.forEach(function(xy){pts.push(xy);});
        L.marker(line[0],{icon:emojiIcon('🚩')}).addTo(MAPLAYER).bindPopup('🚩 Início — '+esc(r.nome||'Rota'));
        L.marker(line[line.length-1],{icon:emojiIcon('🏁')}).addTo(MAPLAYER).bindPopup('🏁 Chegada — '+esc(r.nome||'Rota')); }
    });
    (d.marcacoes||[]).forEach(function(m){ var la=coord(m.lat),ln=coord(m.lng); if(!ptOk(la,ln))return;
      L.marker([la,ln],{icon:emojiIcon(iconeMarca(m.tipo))}).addTo(MAPLAYER).bindPopup(marcaPopup(m)); pts.push([la,ln]); });
  }
  d.abates.forEach(function(a){ var fk={'Armadilha':'armadilha'}[a.tipoManejo]; if(!fk||!MAPFILTER[fk])return; var la=coord(a.lat),ln=coord(a.lng); if(!ptOk(la,ln))return;
    var cor=TIPO_COR[a.tipoManejo]||'#666', ctx='';
    if(a.tipoManejo==='Espera') ctx='<b>Ceva:</b> '+esc(d._cevaN[a.cevaId]||'—');
    else if(a.tipoManejo==='Espreita') ctx='<b>Transporte:</b> '+esc(d._transN[a.transporteId]||'—');
    else if(a.tipoManejo==='Armadilha') ctx='<b>Armadilha:</b> '+esc(d._armN[a.armadilhaId]||'—');
    else if(a.tipoManejo==='Cães'){ var nomes=String(a.caesIds||'').split(',').filter(String).map(function(id){return d._caoN[id]||id;}); ctx='<b>Cães:</b> '+esc(nomes.join(', ')||'—'); }
    var pop='<div class="pop"><h4><span style="color:'+cor+'">●</span> Abate — '+esc(rotuloManejo(a.tipoManejo))+'</h4><div class="meta"><b>Data:</b> '+fmtDataHora(a.dataHora)+'<br><b>Qtd:</b> '+esc(a.quantidade||'1')+(a.sexo?' · '+esc(a.sexo):'')+(a.pesoAprox?' · ~'+esc(a.pesoAprox)+'kg':'')+'<br>'+ctx+(a.obs?'<br><b>Obs:</b> '+esc(a.obs):'')+'</div>'+(a.fotoUrl?'<img src="'+esc(imgSrc(a.fotoUrl))+'" style="width:100%;border-radius:8px;margin-top:6px">':'')+(a.tipoManejo==='Espera'&&a.cevaId?'<button class="btn sm" style="margin-top:8px" onclick="abrirCevaTimeline(\''+a.cevaId+'\')">📈 Linha do tempo da ceva</button>':'')+'</div>';
    add(L.circleMarker([la,ln],{radius:8,color:'#333',fillColor:cor,fillOpacity:.9,weight:1.5}).bindPopup(pop),la,ln); });
  if(MAPFILTER.rede && NETDATA){
    (NETDATA.empresas||[]).forEach(function(e){ var la=coord(e.lat),ln=coord(e.lng); if(!ptOk(la,ln))return;
      add(L.marker([la,ln],{icon:avatarIcon({tipo:'empresa',fotoUrl:e.fotoUrl})}).bindPopup(netPopEmpresa(e)),la,ln); });
    (NETDATA.manejadores||[]).forEach(function(m){ var la=coord(m.lat),ln=coord(m.lng); if(!ptOk(la,ln))return;
      if(m.eu){ add(L.marker([la,ln],{icon:avatarIcon(m,52,true)}).bindPopup('<div class="pop"><h4>📍 Você está aqui</h4></div>'),la,ln); }
      else { add(L.marker([la,ln],{icon:avatarIcon(m)}).bindPopup(netPopManej(m)),la,ln); } });
  }
  var info=document.getElementById('mapCount'); if(info) info.textContent = pts.length? (pts.length+' ponto(s)') : 'Nada com esse filtro (ou sem coordenadas)';
  try{
    if(pts.length===1) CURRENTMAP.setView(pts[0],14);
    else if(pts.length>1) CURRENTMAP.fitBounds(pts,{padding:[40,40],maxZoom:15});
  }catch(e){ CURRENTMAP.setView([-15.78,-47.93],4); }
}

/* ===== Painel: Linha do tempo / Resumo da ceva ===== */
var CEVATL={ cevaId:null, tab:'tl', dim:'Atrativo' };
window.abrirCevaTimeline=function(cevaId){ if(CURRENTMAP) CURRENTMAP.closePopup(); CEVATL.cevaId=cevaId; CEVATL.tab='tl'; CEVATL.dim='Atrativo'; renderCevaPanel(); document.getElementById('cevaPanel').classList.add('open'); };
window.fecharCevaPanel=function(){ document.getElementById('cevaPanel').classList.remove('open'); };
window.cevaTab=function(t){ CEVATL.tab=t; renderCevaPanel(); };
window.cevaDim=function(d){ CEVATL.dim=d; renderCevaPanel(); };
function periodoDe(h){ if(h<6)return'Madrugada'; if(h<12)return'Manhã'; if(h<18)return'Tarde'; return'Noite'; }
function horaDe(iso){ var s=String(iso||''); var i=s.indexOf('T'); return i>0? parseInt(s.substring(i+1,i+3),10) : null; }
function agruparCeva(abs,d,dim){
  var m={};
  abs.forEach(function(a){ var k;
    if(dim==='Atrativo') k=d.alimentoTipo[a.alimentoId]||'—';
    else if(dim==='Sexo') k=a.sexo||'—';
    else if(dim==='Período'){ var h=horaDe(a.dataHora); k=h==null?'—':periodoDe(h); }
    else { var h2=horaDe(a.dataHora); k=h2==null?'—':(h2+'h'); }
    m[k]=(m[k]||0)+1;
  });
  var keys=Object.keys(m);
  if(dim==='Horário') keys.sort(function(a,b){return (parseInt(a,10)||0)-(parseInt(b,10)||0);});
  else if(dim==='Período') keys.sort(function(a,b){var o={'Madrugada':0,'Manhã':1,'Tarde':2,'Noite':3,'—':4};return (o[a]||9)-(o[b]||9);});
  return keys.map(function(k){ return {label:k, value:m[k]}; });
}
window.verFoto=function(url){ if(!url)return; document.getElementById('lightboxImg').src=url; document.getElementById('lightbox').classList.add('open'); };
window.fecharFoto=function(){ document.getElementById('lightbox').classList.remove('open'); };
function timelineCevaHtml(abs,d){
  return '<div class="tl">'+abs.map(function(a){
    var atr=d.alimentoTipo[a.alimentoId]||'—';
    var foto = a.fotoUrl ? '<button class="btn sm sec" style="margin-top:8px;width:auto" onclick="verFoto(\''+esc(imgSrc(a.fotoUrl))+'\')">📷 Ver foto do abate</button>' : '';
    return '<div class="tl-item"><div class="tl-dot"></div><div class="tl-card"><div class="row">'+
      (a.fotoUrl?'<img class="thumb" style="width:52px;height:52px;cursor:zoom-in" onclick="verFoto(\''+esc(imgSrc(a.fotoUrl))+'\')" src="'+esc(imgSrc(a.fotoUrl))+'">':'')+
      '<div class="grow"><div class="dt">'+fmtDataHora(a.dataHora)+'</div><div class="meta">'+
      esc(a.quantidade||'1')+' animal(is)'+(a.sexo?' · '+esc(a.sexo):'')+(a.pesoAprox?' · ~'+esc(a.pesoAprox)+'kg':'')+'<br>🌽 Atrativo: <b>'+esc(atr)+'</b>'+(a.obs?'<br>'+esc(a.obs):'')+'</div></div></div>'+foto+'</div></div>';
  }).join('')+'</div>';
}
function resumoCevaHtml(abs,d){
  var animais=abs.reduce(function(s,a){return s+(parseInt(a.quantidade,10)||0);},0);
  var dims=['Atrativo','Sexo','Período','Horário'];
  var btns=dims.map(function(x){ return '<button class="chip'+(CEVATL.dim===x?' on':'')+'" onclick="cevaDim(\''+x+'\')">'+x+'</button>'; }).join(' ');
  var pairs=agruparCeva(abs,d,CEVATL.dim);
  var ult=abs.slice().sort(function(a,b){return String(b.dataHora).localeCompare(String(a.dataHora));})[0];
  return '<div class="dash"><div class="kpi"><b>'+animais+'</b><span>animais abatidos</span></div><div class="kpi"><b>'+(ult?fmtData(ult.dataHora):'—')+'</b><span>último abate</span></div></div>'+
    '<div style="display:flex;gap:6px;flex-wrap:wrap;margin:10px 0">'+btns+'</div>'+
    '<h4 style="margin:4px 0 2px;font-size:12px;color:var(--txt2)">Abates por '+CEVATL.dim.toLowerCase()+'</h4>'+
    barChart(pairs,{w:330,h:130,color:TIPO_COR.Espera});
}
function renderCevaPanel(){
  var d=MAPDATA; if(!d) return; var ceva=(d.cevas||[]).filter(function(c){return c.id===CEVATL.cevaId;})[0]; if(!ceva) return;
  var abs=d.abates.filter(function(a){return a.cevaId===ceva.id;}).sort(function(a,b){return String(b.dataHora).localeCompare(String(a.dataHora));});
  var head='<div class="row"><h3 class="grow" style="margin:0">🌽 '+esc(ceva.nome||'Ceva')+'</h3><button class="ib" onclick="fecharCevaPanel()">✕</button></div>'+
    '<div class="tabs" style="margin:10px 0"><div class="tab'+(CEVATL.tab==='tl'?' on':'')+'" onclick="cevaTab(\'tl\')">📈 Linha do tempo</div><div class="tab'+(CEVATL.tab==='res'?' on':'')+'" onclick="cevaTab(\'res\')">📊 Resumo</div></div>';
  var body = !abs.length ? '<div class="empty">Nenhum abate registrado nesta ceva ainda.</div>'
    : (CEVATL.tab==='tl' ? timelineCevaHtml(abs,d) : resumoCevaHtml(abs,d));
  document.getElementById('cevaPanel').innerHTML=head+body;
}

/* ============================================================
   INÍCIO
   ============================================================ */
function iniciar(){ loadingBox('Conectando ao servidor…');
  server('apiPing').then(function(p){ STATE.appNome='JavaStreak'; setTitulo(STATE.appNome);
    if(AUTH.token){ return server('apiBoot').then(function(b){ STATE.tipo=b.tipo||'manejador'; STATE.admin=!!b.admin;
        if(STATE.tipo==='empresa'){ STATE.empresa=b.empresa||null; STATE.manejador=null; STATE.stack=['empresa']; }
        else { STATE.manejador=b.manejador; AUTH.manejador=b.manejador; STATE.empresa=null; STATE.stack=['inicio']; }
        aplicarFundo(); render(); iniciarPromoPoll(); })
      .catch(function(e){ if(!(e&&e.message==='Sessão expirada')){ salvarToken(''); STATE.stack=['login']; render(); } }); }
    STATE.stack=['login']; render();
  }).catch(function(){ app('<div class="empty"><div class="big">⚠️</div>Não consegui falar com o servidor.<br><br>Confira a <b>API_URL</b> e se a implantação está como <b>“Qualquer pessoa”</b>.<div style="max-width:280px;margin:18px auto 0"><button class="btn" onclick="iniciar()">Tentar novamente</button></div></div>'); }); }
iniciar();
</script>
