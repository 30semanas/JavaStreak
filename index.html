<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>JavaStreak</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{
    --verde:#2e4d2e; --verde-claro:#3f6b3f; --verde-esc:#213a21;
    --terra:#8a6d3b; --areia:#f4f1e8; --card:#ffffff;
    --txt:#22301f; --txt2:#5c6b58; --linha:#e2ded2;
    --danger:#b23b3b; --ok:#2f7d3a; --alerta:#c8892b;
    --sombra:0 2px 8px rgba(0,0,0,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
       background:var(--areia);color:var(--txt);padding-bottom:80px}
  header{position:sticky;top:0;z-index:1100;background:var(--verde);color:#fff;
         padding:12px 14px;display:flex;align-items:center;gap:10px;box-shadow:var(--sombra)}
  header .back{font-size:22px;cursor:pointer;width:30px;line-height:1;opacity:.95}
  header .titulo{font-size:16px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  header .sub{font-size:11px;opacity:.75;font-weight:400;display:block}
  .wrap{max-width:640px;margin:0 auto;padding:14px}
  .crumb{font-size:12px;color:var(--txt2);margin:2px 0 12px;display:flex;flex-wrap:wrap;gap:4px}
  .crumb b{color:var(--verde)}

  .card{background:var(--card);border:1px solid var(--linha);border-radius:14px;
        padding:14px;margin-bottom:12px;box-shadow:var(--sombra)}
  .card.click{cursor:pointer;transition:transform .06s}
  .card.click:active{transform:scale(.985)}
  .card h3{margin:0 0 4px;font-size:16px}
  .card .meta{font-size:12px;color:var(--txt2);line-height:1.5}
  .row{display:flex;align-items:center;gap:10px}
  .grow{flex:1}
  .pill{display:inline-block;background:var(--verde-claro);color:#fff;font-size:11px;
        padding:3px 9px;border-radius:20px;margin:2px 4px 0 0}
  .pill.gray{background:#98a08f}
  .pill.warn{background:var(--alerta)} .pill.ok{background:var(--ok)} .pill.dan{background:var(--danger)}

  .menu-card{display:flex;align-items:center;gap:14px}
  .menu-card .ic{font-size:26px;width:44px;height:44px;border-radius:12px;
                 display:flex;align-items:center;justify-content:center;background:var(--areia)}
  .menu-card .txt h3{margin:0;font-size:15px}
  .menu-card .txt p{margin:2px 0 0;font-size:12px;color:var(--txt2)}
  .menu-card .chev{margin-left:auto;color:#b7bdae;font-size:20px}
  .menu-card.disabled{opacity:.5}

  label{display:block;font-size:13px;font-weight:600;color:var(--txt2);margin:12px 0 5px}
  input,select,textarea{width:100%;padding:11px 12px;border:1px solid var(--linha);
        border-radius:10px;font-size:15px;background:#fff;color:var(--txt);font-family:inherit}
  textarea{min-height:70px;resize:vertical}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--verde-claro);
        box-shadow:0 0 0 3px rgba(63,107,63,.15)}
  .two{display:flex;gap:10px} .two>div{flex:1}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
       width:100%;padding:13px;border:none;border-radius:11px;font-size:15px;font-weight:600;
       cursor:pointer;background:var(--verde);color:#fff;margin-top:16px}
  .btn:active{background:var(--verde-esc)}
  .btn.sec{background:#fff;color:var(--verde);border:1.5px solid var(--verde)}
  .btn.gps{background:var(--terra);margin-top:6px;padding:10px}
  .btn.sm{width:auto;padding:9px 14px;font-size:13px;margin-top:0}
  .btn.danger{background:var(--danger)}

  .fab{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);max-width:612px;width:calc(100% - 28px);z-index:900}
  .fab .btn{box-shadow:0 6px 18px rgba(46,77,46,.4)}

  .checks{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
  .check{display:flex;align-items:center;gap:7px;background:#fff;border:1.5px solid var(--linha);
         padding:9px 12px;border-radius:10px;font-size:14px;cursor:pointer;user-select:none}
  .check.on{border-color:var(--verde);background:#eef3ea;color:var(--verde);font-weight:600}
  .check input{width:auto;margin:0}

  .empty{text-align:center;color:var(--txt2);padding:34px 16px;font-size:14px}
  .empty .big{font-size:40px;margin-bottom:8px;opacity:.5}

  .tabs{display:flex;gap:6px;margin:4px 0 14px;background:#fff;padding:5px;border-radius:12px;border:1px solid var(--linha)}
  .tab{flex:1;text-align:center;padding:9px;border-radius:8px;font-size:13px;font-weight:600;color:var(--txt2);cursor:pointer}
  .tab.on{background:var(--verde);color:#fff}

  .foto-prev{width:100%;max-height:220px;object-fit:cover;border-radius:10px;margin-top:8px;display:none;border:1px solid var(--linha)}
  .thumb{width:64px;height:64px;object-fit:cover;border-radius:10px;border:1px solid var(--linha)}

  .nivel-bar{height:14px;background:#e7e3d6;border-radius:8px;overflow:hidden;margin-top:6px}
  .nivel-bar span{display:block;height:100%;background:linear-gradient(90deg,#c8892b,#2f7d3a)}
  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:#222;color:#fff;
         padding:11px 18px;border-radius:24px;font-size:14px;z-index:2000;opacity:0;transition:.25s;pointer-events:none;max-width:90%}
  .toast.show{opacity:1}
  .loading{text-align:center;padding:40px;color:var(--txt2)}
  .spin{width:26px;height:26px;border:3px solid var(--linha);border-top-color:var(--verde);
        border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 10px}
  @keyframes sp{to{transform:rotate(360deg)}}
  /* ===== Animação de caça no carregamento ===== */
  .hunt{position:fixed;top:56px;left:0;right:0;bottom:0;z-index:60;overflow:hidden;pointer-events:none}
  .hunt-boar{position:absolute;top:50%;left:50%;width:min(40vw,430px);transform:translate(-50%,-50%);animation:huntBoar 3s ease-in-out infinite;filter:drop-shadow(0 6px 8px rgba(0,0,0,.3))}
  .hunt-mira{position:absolute;top:50%;left:50%;width:min(20vw,210px);height:min(20vw,210px);transform:translate(-50%,-50%);animation:huntMira 3s ease-in-out infinite}
  .hunt-flash{position:absolute;top:50%;left:50%;width:min(31vw,330px);height:min(31vw,330px);border-radius:50%;transform:translate(-50%,-50%) scale(.2);opacity:0;pointer-events:none;background:radial-gradient(circle,#fff 0%,#ffb347 38%,rgba(255,140,0,0) 70%);animation:huntFlash 3s ease-in-out infinite}
  @keyframes huntBoar{
    0%{transform:translate(-50%,-50%) translateX(75vw);opacity:1}
    30%{transform:translate(-50%,-50%) translateX(0);opacity:1}
    60%{transform:translate(-50%,-50%) translateX(0);opacity:1}
    66%{transform:translate(-50%,-50%) translateX(2vw) rotate(5deg);opacity:.92}
    74%{transform:translate(-50%,-50%) translateX(6vw) scale(.6) rotate(14deg);opacity:0}
    100%{transform:translate(-50%,-50%) translateX(6vw) scale(.6);opacity:0}
  }
  @keyframes huntMira{
    0%{transform:translate(-50%,-50%) translateX(-75vw) scale(1.5);opacity:0}
    18%{opacity:.9}
    56%{transform:translate(-50%,-50%) translateX(0) scale(1);opacity:.95}
    63%{transform:translate(-50%,-50%) translateX(0) scale(.82);opacity:1}
    70%{transform:translate(-50%,-50%) translateX(0) scale(1);opacity:.55}
    100%{transform:translate(-50%,-50%) translateX(0) scale(1);opacity:0}
  }
  @keyframes huntFlash{
    0%,62%{opacity:0;transform:translate(-50%,-50%) scale(.2)}
    66%{opacity:1;transform:translate(-50%,-50%) scale(1)}
    72%{opacity:0;transform:translate(-50%,-50%) scale(1.35)}
    100%{opacity:0}
  }
  .hunt-txt{position:absolute;bottom:8%;left:0;right:0;text-align:center;color:var(--txt2);font-size:15px}
  @media(min-width:900px){ body.logged .hunt{left:250px} }
  a.mapa{font-size:12px;color:var(--terra);text-decoration:none}
  .dot{width:11px;height:11px;border-radius:50%;background:#9aa38c;flex:none;transition:.25s}
  .dot.on{background:#4ade80;box-shadow:0 0 0 3px rgba(74,222,128,.30)}
  .dot.off{background:#f87171;box-shadow:0 0 0 3px rgba(248,113,113,.30)}

  .acoes{display:flex;gap:6px;margin-left:auto}
  .ib{background:var(--areia);border:1px solid var(--linha);border-radius:9px;padding:7px 9px;font-size:14px;cursor:pointer;line-height:1}
  .ib:active{background:#e7e3d6}
  #map{height:56vh;min-height:320px;border-radius:14px;border:1px solid var(--linha);z-index:1}
  .leaflet-popup-content{margin:10px 12px;font-family:inherit}
  .pop h4{margin:0 0 4px;font-size:14px;color:var(--verde)}
  .pop .meta{font-size:12px;color:var(--txt2);line-height:1.5}
  .dash{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .kpi{flex:1;min-width:90px;background:#fff;border:1px solid var(--linha);border-radius:12px;padding:10px 12px;box-shadow:var(--sombra)}
  .kpi b{display:block;font-size:22px;color:var(--verde)} .kpi span{font-size:11px;color:var(--txt2)}
  .legend{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--txt2);margin-top:8px}
  .legend i{width:11px;height:11px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}
  .filtros{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
  .chip{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1.5px solid var(--linha);color:var(--txt2);padding:6px 10px;border-radius:20px;font-size:12px;cursor:pointer;user-select:none}
  .chip.on{border-color:var(--verde);background:#eef3ea;color:var(--verde);font-weight:600}
  .chip i{width:10px;height:10px;border-radius:50%;display:inline-block}
  .cal{background:#fff;border:1px solid var(--linha);border-radius:14px;padding:10px 12px;margin-bottom:12px;box-shadow:var(--sombra)}
  .calhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .calhead b{font-size:14px}
  .cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
  .cwd{text-align:center;font-size:11px;color:var(--txt2);padding:4px 0;font-weight:600}
  .cday{position:relative;text-align:center;padding:9px 0;font-size:13px;border-radius:8px;cursor:pointer}
  .cday.empty{cursor:default}
  .cday.tem{font-weight:700}
  .cday.hoje{outline:2px solid var(--verde-claro);outline-offset:-2px}
  .cday.sel{background:var(--verde);color:#fff}
  .cdot{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:6px;height:6px;border-radius:50%}

  /* ===== BARRA LATERAL ===== */
  #sidebar{position:fixed;top:0;left:0;bottom:0;width:250px;z-index:1300;transform:translateX(-100%);transition:transform .25s;
           background:linear-gradient(#243b20,#1a2c16);color:#e9e2cf;display:flex;flex-direction:column;box-shadow:2px 0 14px rgba(0,0,0,.35);overflow-y:auto}
  body.logged.menu-open #sidebar{transform:translateX(0)}
  #overlay{position:fixed;inset:0;background:rgba(20,14,6,.5);z-index:1250;opacity:0;pointer-events:none;transition:.25s}
  body.logged.menu-open #overlay{opacity:1;pointer-events:auto}
  .sb-brand{padding:12px 10px;display:flex;justify-content:center;border-bottom:1px solid rgba(255,255,255,.12)}
  .sb-brand img{width:100%;max-width:200px;height:auto;max-height:200px;object-fit:contain;border-radius:8px}
  .sb-user{padding:9px 16px;font-size:12px;color:#b7c3a5;border-bottom:1px solid rgba(255,255,255,.08);text-transform:uppercase;letter-spacing:.3px}
  #sbNav{flex:1;padding:8px}
  .sb-item{display:flex;align-items:center;gap:12px;padding:9px 11px;border-radius:10px;cursor:pointer;color:#e9e2cf;font-size:14px;margin-bottom:2px;text-transform:uppercase;letter-spacing:.3px}
  .sb-item:hover{background:rgba(255,255,255,.07)}
  .sb-item.active{background:rgba(238,138,46,.20);font-weight:600;box-shadow:inset 3px 0 0 #ee8a2e}
  .sb-item img{width:36px;height:36px;object-fit:cover;border-radius:9px;background:#fff;padding:2px;flex:none;border:1px solid rgba(0,0,0,.1)}
  .sb-item .emoji{width:36px;text-align:center;font-size:21px;flex:none}
  .sb-sair{margin:8px 12px 14px;padding:11px;border:1px solid rgba(255,255,255,.3);background:transparent;color:#e9e2cf;border-radius:10px;cursor:pointer;font-size:14px;text-transform:uppercase;letter-spacing:.3px}
  .sb-switch{display:flex;gap:6px;margin:8px 8px 10px;background:rgba(0,0,0,.18);border-radius:12px;padding:4px}
  .sb-switch button{flex:1;border:none;background:transparent;color:#cdd6bf;font-size:12px;font-weight:700;padding:8px 4px;border-radius:9px;cursor:pointer;text-transform:uppercase;letter-spacing:.3px}
  .sb-switch button.on{background:linear-gradient(#ee8a2e,#d9761f);color:#fff;box-shadow:0 2px 6px rgba(0,0,0,.25)}
  .sb-cfg{margin-top:8px;border-top:1px solid rgba(255,255,255,.10);border-radius:0;padding-top:14px}
  .segbar{display:flex;gap:8px;margin:8px 0 12px;background:#efe3cc;border:1px solid #e0d4b6;border-radius:14px;padding:5px}
  .segbar button{flex:1;border:none;background:transparent;color:var(--txt2);font-size:14px;font-weight:700;padding:11px 6px;border-radius:10px;cursor:pointer}
  .segbar button.on{background:linear-gradient(#3a5a34,#2e4d2e);color:#fff;box-shadow:0 2px 8px rgba(46,77,46,.3)}
  .hbell{position:relative;background:transparent;border:none;color:#fff;font-size:19px;cursor:pointer;width:32px}
  .hbadge{position:absolute;top:-4px;right:-2px;background:#ee2e2e;color:#fff;font-size:10px;font-weight:700;min-width:16px;height:16px;line-height:16px;border-radius:9px;padding:0 3px;display:none}
  .hbadge.on{display:block}
  #promoPanel{position:fixed;inset:0;background:rgba(20,14,6,.5);z-index:3200;display:none;justify-content:center;align-items:flex-start;padding:16px}
  #promoPanel.open{display:flex}
  .promo-box{background:var(--papel,#fbf7ee);border:1px solid var(--linha);border-radius:16px;width:100%;max-width:440px;max-height:88vh;overflow:auto;padding:14px;box-shadow:0 10px 30px rgba(0,0,0,.4);margin-top:40px}
  .preco-old{text-decoration:line-through;color:var(--txt2)}
  .preco-new{color:var(--danger);font-weight:800;font-size:18px}
  .sb-sair:active{background:rgba(255,255,255,.08)}
  .hamb{font-size:22px;background:transparent;border:none;color:#fff;cursor:pointer;width:32px;line-height:1;display:none}
  @media(max-width:899px){ body.logged .hamb{display:block} }
  @media(min-width:900px){
    body.logged #sidebar{transform:translateX(0)}
    body.logged header, body.logged .wrap{margin-left:250px}
    body.logged .fab{left:calc(50% + 125px)}
    #overlay{display:none}
  }

  /* ===== TEMA RÚSTICO ===== */
  body{background:#e9ddc4;
       background-image:linear-gradient(rgba(90,60,25,.030) 1px,transparent 1px),linear-gradient(90deg,rgba(90,60,25,.030) 1px,transparent 1px);
       background-size:24px 24px}
  header{background:linear-gradient(#2e4d2e,#24401d);border-bottom:3px solid #ee8a2e}
  .card{border-color:#d9cdae;box-shadow:0 1px 3px rgba(70,45,18,.13)}
  .card h3, header .titulo, .sb-brand, .empty{font-family:Georgia,'Times New Roman',serif}
  .btn{background:linear-gradient(#3a5a34,#2e4d2e);box-shadow:0 1px 0 rgba(0,0,0,.15)}
  .btn.gps{background:linear-gradient(#9a7b41,#7a5c2c)}
  .menu-card .ic{background:#efe3cc;border:1px solid #e0d4b6}
  .pill{border:1px solid rgba(0,0,0,.06)}
  .rustic-hero{background:linear-gradient(135deg,#f3ead2,#e7d9b8);border:1px solid #d8c79f}

  /* ===== POLIMENTO MODERNO (mantendo o rústico) ===== */
  :root{ --sombra:0 4px 14px rgba(60,40,18,.10); }
  .card{border-radius:16px;box-shadow:0 3px 10px rgba(60,40,18,.08),0 1px 2px rgba(60,40,18,.05);
        transition:transform .14s ease,box-shadow .14s ease,border-color .14s ease}
  .card.click:hover,.menu-card.click:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(60,40,18,.15);border-color:#cbbf9e}
  .card.click:active{transform:translateY(0) scale(.99)}
  .menu-card{padding:16px}
  .menu-card .ic{width:48px;height:48px;border-radius:14px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.04),0 3px 8px rgba(120,90,40,.16)}
  .menu-card .chev{color:#c8892b;font-weight:700;transition:transform .14s}
  .menu-card.click:hover .chev{transform:translateX(4px)}
  .btn{border-radius:13px;box-shadow:0 4px 12px rgba(46,77,46,.24);transition:filter .14s,transform .06s,box-shadow .14s;font-weight:700;letter-spacing:.2px}
  .btn:hover{filter:brightness(1.08)}
  .btn:active{transform:translateY(1px)}
  .btn.sec{background:#fffdf8;color:var(--verde);border:1px solid #ddceac;box-shadow:0 2px 8px rgba(60,40,18,.08)}
  .btn.sec:hover{filter:none;background:#f7f1e2}
  input,select,textarea{border-radius:12px;border-color:#ddd4be;background:#fffdf8;transition:border-color .14s,box-shadow .14s}
  input:focus,select:focus,textarea:focus{border-color:#c8892b;box-shadow:0 0 0 3px rgba(200,137,43,.18)}
  .pill{border-radius:20px;font-weight:600}
  header{box-shadow:0 5px 18px rgba(20,30,15,.20)}
  .crumb b{color:#c8892b}
  .card h3{letter-spacing:.2px}
  .rustic-hero{background:linear-gradient(135deg,#f7f0de,#ece0c2);border:1px solid #ddceac;box-shadow:0 5px 16px rgba(90,60,25,.10)}
  .kpi{border-radius:14px !important;box-shadow:0 2px 8px rgba(60,40,18,.07)}
  .chip{border-radius:22px !important;box-shadow:0 2px 6px rgba(0,0,0,.10);transition:transform .1s}
  .chip:active{transform:scale(.96)}
  .fab .btn{box-shadow:0 8px 22px rgba(46,77,46,.35)}
  .thumb{border-radius:12px}
  ::selection{background:rgba(200,137,43,.28)}

  /* ===== MAPA TELA CHEIA ===== */
  #mapshell{position:fixed;left:0;right:0;bottom:0;top:56px;z-index:800;display:none}
  body.map-mode #mapshell{display:block}
  body.map-mode .wrap{display:none}
  body.map-mode .fab{display:none!important}
  #mapshell #map{width:100%;height:100%}
  .map-bar{position:absolute;top:8px;left:8px;right:56px;z-index:820;display:flex;flex-wrap:wrap;gap:6px;pointer-events:none}
  .map-bar>*{pointer-events:auto}
  .map-bar .chip{background:rgba(255,255,255,.95);box-shadow:0 1px 4px rgba(0,0,0,.2)}
  .map-panel{position:absolute;top:8px;left:8px;z-index:830;width:min(320px,88%);max-height:78%;overflow:auto;
             background:rgba(255,251,244,.97);border:1px solid var(--linha);border-radius:12px;padding:12px;box-shadow:0 4px 16px rgba(0,0,0,.25);display:none}
  .map-panel.open{display:block}
  .map-panel h4{margin:8px 0 2px;font-size:12px;color:var(--txt2)}
  .map-count{position:absolute;bottom:10px;left:8px;z-index:820;background:rgba(255,255,255,.92);border:1px solid var(--linha);
             border-radius:20px;padding:5px 12px;font-size:12px;color:var(--txt2);box-shadow:0 1px 4px rgba(0,0,0,.15)}
  @media(min-width:900px){ body.logged #mapshell{left:250px} }
  .ceva-panel{position:absolute;top:8px;right:8px;bottom:8px;z-index:840;width:min(380px,94%);overflow:auto;
              background:rgba(255,251,244,.98);border:1px solid var(--linha);border-radius:12px;padding:12px;box-shadow:0 6px 20px rgba(0,0,0,.3);display:none}
  .ceva-panel.open{display:block}
  .tl{position:relative;margin:4px 0 0 6px;padding-left:16px;border-left:2px solid #d8c79f}
  .tl-item{position:relative;margin-bottom:10px}
  .tl-dot{position:absolute;left:-23px;top:14px;width:11px;height:11px;border-radius:50%;background:var(--verde);border:2px solid #fff;box-shadow:0 0 0 1px #d8c79f}
  .tl-card{background:#fff;border:1px solid var(--linha);border-radius:10px;padding:9px 11px}
  .tl-card .dt{font-size:12px;color:var(--verde);font-weight:700}
  #lightbox{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:3000;display:none;align-items:center;justify-content:center;padding:16px;cursor:zoom-out}
  #lightbox.open{display:flex}
  #lightbox img{max-width:100%;max-height:100%;border-radius:10px;box-shadow:0 6px 30px rgba(0,0,0,.6)}
  #markModal{position:fixed;inset:0;background:rgba(20,14,6,.55);z-index:3100;display:none;align-items:center;justify-content:center;padding:16px}
  #markModal.open{display:flex}

var API_URL = 'https://script.google.com/macros/s/AKfycby_LWJgdy0nffHnXE0Zi9eHviuVgiDPbByini4eyWyqsotc3wsUz0zLMV3-ZBRUvp7rXQ/exec';

function server(fn){
  var args = Array.prototype.slice.call(arguments,1);
  var ctrl = new AbortController();
  var to = setTimeout(function(){ ctrl.abort(); }, 25000);
  return fetch(API_URL, { method:'POST', redirect:'follow', signal:ctrl.signal,
    body: JSON.stringify({ action:fn, args:args, token:AUTH.token }) })
  .then(function(r){ clearTimeout(to); return r.json(); })
  .then(function(j){
    if(!j.ok){
      if(j.error==='NAO_AUTENTICADO'){ setConn(true); sessaoExpirada(); throw new Error('Sessão expirada'); }
      throw new Error(j.error || 'Erro no servidor');
    }
    setConn(true); return j.data;
  })
  .catch(function(e){
    clearTimeout(to);
    if(e && e.message==='Sessão expirada'){ throw e; }
    setConn(false);
    var msg = (e && e.name==='AbortError') ? 'Servidor não respondeu (tempo esgotado)' : (e && e.message ? e.message : e);
    toast('Erro: '+msg); throw e;
  });
}
function sessaoExpirada(){ salvarToken(''); AUTH.manejador=null; STATE.manejador=null; toast('Sessão expirada, entre novamente'); STATE.stack=['login']; render(); }
function setConn(ok){ var d=document.getElementById('connDot'); if(!d)return; d.className='dot '+(ok?'on':'off'); d.title=ok?'Conectado':'Sem conexão'; }

function nav(view, push){ if(push!==false) STATE.stack.push(view); render(); }
function voltar(){ STATE.stack.pop(); render(); }
function render(){
  if(CURRENTMAP){ try{ CURRENTMAP.remove(); }catch(e){} CURRENTMAP=null; }
  if(ROUTEMAP){ try{ ROUTEMAP.remove(); }catch(e){} ROUTEMAP=null; }
  if(GEOWATCH!=null){ try{ navigator.geolocation.clearWatch(GEOWATCH); }catch(e){} GEOWATCH=null; }
  var _mm=document.getElementById('markModal'); if(_mm) _mm.classList.remove('open');
  document.body.classList.remove('map-mode');
  var padrao = AUTH.token ? 'inicio' : 'login';
  var view = STATE.stack[STATE.stack.length-1] || padrao;
  var noLogin = (view==='login' || view==='registrar');
  document.getElementById('btnBack').style.display = (STATE.stack.length>1 && !noLogin) ? 'block':'none';
  var f=document.getElementById('fab'); f.style.display='none'; f.innerHTML='';
  (VIEWS[view]||VIEWS.login)();
  updateHeader();
  buildSidebar();
}
function updateHeader(){
  var logado = !!AUTH.token;
  var nome = (STATE.tipo==='empresa') ? ((STATE.empresa&&STATE.empresa.nome)||'Empresa') : ((STATE.manejador&&STATE.manejador.nome)||'');
  document.getElementById('hSub').textContent = (logado && nome) ? nome : STATE.appNome;
  document.body.classList.toggle('logged', logado);
  var bell=document.getElementById('hbell'); if(bell) bell.style.display = logado ? 'block':'none';
  if(!logado) closeMenu();
}

function buildSidebar(){
  var lg=document.getElementById('sbLogo'); if(lg && lg.getAttribute('src')!==LOGO) lg.src=LOGO;
  var nav=document.getElementById('sbNav'); if(!nav) return;
  var tipo=STATE.tipo||'manejador';
  var root=STATE.stack[0]||(tipo==='empresa'?'empresa':'inicio');
  var lista=(tipo==='empresa')?NAV_LOJISTA:NAV_MANEJADOR.slice();
  if(tipo==='manejador' && STATE.admin) lista=lista.concat([{v:'admin',label:'Administração',emoji:'🛡️'}]);
  var itens=lista.map(function(n){
    var ic = n.icon ? '<img src="'+ICONS[n.icon]+'" alt="">' : '<span class="emoji">'+n.emoji+'</span>';
    return '<div class="sb-item'+(root===n.v?' active':'')+'" onclick="go(\''+n.v+'\')">'+ic+'<span>'+n.label+'</span></div>';
  }).join('');
  var cfgView=(tipo==='empresa')?'empresa':'perfilManejador';
  var cfg='<div class="sb-item sb-cfg'+(root===cfgView?' active':'')+'" onclick="go(\''+cfgView+'\')"><span class="emoji">⚙️</span><span>Configurar perfil</span></div>';
  nav.innerHTML=itens+cfg;
  var u=document.getElementById('sbUser'); if(u) u.textContent = (tipo==='empresa') ? ((STATE.empresa&&STATE.empresa.nome)||'Empresa') : ((STATE.manejador&&STATE.manejador.nome)||'');
}

function fmtData(iso){ if(!iso)return''; var s=String(iso); if(s.indexOf('T')>0){var d=s.split('T')[0].split('-');return d[2]+'/'+d[1]+'/'+d[0];} if(s.indexOf('-')===4){var p=s.split('-');return p[2]+'/'+p[1]+'/'+p[0];} return s; }
function fmtDataHora(iso){ if(!iso)return''; var s=String(iso); if(s.indexOf('T')>0){var d=s.split('T');var dd=d[0].split('-');var hh=(d[1]||'').substring(0,5);return dd[2]+'/'+dd[1]+'/'+dd[0]+' '+hh;} return fmtData(iso); }
function idade(n){ if(!n)return''; var d=new Date(n); if(isNaN(d))return''; var a=Math.floor((Date.now()-d.getTime())/(365.25*864e5)); return a>=0?a+' ano'+(a!==1?'s':''):''; }
function nowLocal(){ var d=new Date(); var p=function(x){return(x<10?'0':'')+x;}; return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+'T'+p(d.getHours())+':'+p(d.getMinutes()); }
function gpsButton(a,b){ return '<button type="button" class="btn gps" onclick="pegarGps(\''+a+'\',\''+b+'\',this)">📍 Usar minha localização atual</button>'; }
function pegarGps(a,b,btn){ if(!navigator.geolocation){toast('GPS não suportado');return;} var t=btn.textContent; btn.textContent='📡 Localizando…'; btn.disabled=true;
  navigator.geolocation.getCurrentPosition(function(p){ var ea=document.getElementById(a), eb=document.getElementById(b);
    ea.value=p.coords.latitude.toFixed(6); eb.value=p.coords.longitude.toFixed(6);
    try{ ea.dispatchEvent(new Event('input',{bubbles:true})); eb.dispatchEvent(new Event('input',{bubbles:true})); }catch(e){}
    btn.textContent=t; btn.disabled=false; toast('Localização capturada ✔'); },
  function(e){ btn.textContent=t; btn.disabled=false; toast('Falha no GPS: '+e.message); }, {enableHighAccuracy:true,timeout:12000}); }
function mapaLink(lat,lng){ if(!lat||!lng)return''; return '<a class="mapa" target="_blank" href="https://www.google.com/maps?q='+lat+','+lng+'">🗺️ '+lat+', '+lng+'</a>'; }
function val(id){ var e=document.getElementById(id); return e?String(e.value).trim():''; }
function setVal(id,v){ var e=document.getElementById(id); if(e&&v!=null&&v!=='') e.value=v; }
function pv(f){ return (EDIT && EDIT[f]!=null) ? EDIT[f] : ''; }
function pvCoord(f){ var v=pv(f); if(v==='') return ''; var n=parseFloat(String(v).replace(',','.')); if(isNaN(n)) return '';
  if(f==='lat' && (n<-90||n>90)) return ''; if(f==='lng' && (n<-180||n>180)) return ''; return v; }

/* foto -> dataURL (redimensiona/comprime) */
function bindFoto(inputId,prevId){
  var inp=document.getElementById(inputId), prev=document.getElementById(prevId); inp._data='';
  inp.addEventListener('change',function(){ var f=inp.files[0]; if(!f)return; var r=new FileReader();
    r.onload=function(){ var img=new Image();
      img.onload=function(){ var max=1280,w=img.width,h=img.height; if(w>max||h>max){ if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;} }
        var cv=document.createElement('canvas'); cv.width=w; cv.height=h; cv.getContext('2d').drawImage(img,0,0,w,h);
        try{ inp._data=cv.toDataURL('image/jpeg',0.82); }catch(e){ inp._data=r.result; } prev.src=inp._data; prev.style.display='block'; };
      img.onerror=function(){ inp._data=r.result; prev.src=r.result; prev.style.display='block'; }; img.src=r.result; };
    r.readAsDataURL(f); });
}
function fotoData(id){ var i=document.getElementById(id); return i&&i._data?i._data:''; }

/* mini gráfico de barras (SVG) */
function barChart(pairs,opts){ opts=opts||{}; var w=opts.w||250,h=opts.h||95,pad=16;
  if(!pairs.length) return '<div class="meta">Sem dados.</div>';
  var max=Math.max.apply(null,pairs.map(function(p){return p.value;}).concat([1]));
  var gap=(w-pad*2)/pairs.length, bw=gap*0.68;
  var bars=pairs.map(function(p,i){ var bh=(h-pad*2)*(p.value/max); var x=pad+i*gap+(gap-bw)/2, y=h-pad-bh;
    return '<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+Math.max(bh,1).toFixed(1)+'" rx="2" fill="'+(p.color||opts.color||'#3f6b3f')+'"></rect>'+
      '<text x="'+(x+bw/2).toFixed(1)+'" y="'+(h-pad+10)+'" font-size="8" text-anchor="middle" fill="#5c6b58">'+esc(p.label)+'</text>'+
      '<text x="'+(x+bw/2).toFixed(1)+'" y="'+(y-3).toFixed(1)+'" font-size="8" text-anchor="middle" fill="#22301f">'+p.value+'</text>'; }).join('');
  return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" style="max-width:'+w+'px">'+bars+'</svg>'; }
function porMes(abates){ var m={};
  abates.forEach(function(a){ var s=String(a.dataHora||a.dataCadastro||''); var k=s.substring(0,7); if(k) m[k]=(m[k]||0)+1; });
  return Object.keys(m).sort().slice(-6).map(function(k){ var p=k.split('-'); return {label:p[1]+'/'+p[0].substring(2), value:m[k]}; }); }

function montarNetMap(d){ var card=document.getElementById('netMapCard'); if(!card) return; var pts=[];

    (!d.visivel?'<div class="card" style="border-left:5px solid var(--alerta);margin-top:10px"><div class="meta">🔒 Você está <b>oculto</b>: só os lojistas aparecem. Ative sua visibilidade em <b>Configurar</b> para ver os outros manejadores.</div></div>':'')+
    '<div id="netList" style="margin-top:10px"></div>';
  var map=L.map('netMap',{preferCanvas:true,zoomAnimation:false,minZoom:3}).setView([-15.78,-47.93],4);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,noWrap:true,attribution:'© OpenStreetMap'}).addTo(map);
  ROUTEMAP=map; var layer=L.featureGroup().addTo(map);
  (d.empresas||[]).forEach(function(e){ var la=coord(e.lat),ln=coord(e.lng); if(!ptOk(la,ln))return; pts.push([la,ln]); L.marker([la,ln],{icon:emojiIcon('🏪')}).addTo(layer).bindPopup(netPopEmpresa(e)); });
  (d.manejadores||[]).forEach(function(m){ if(m.eu)return; var la=coord(m.lat),ln=coord(m.lng); if(!ptOk(la,ln))return; pts.push([la,ln]); L.marker([la,ln],{icon:emojiIcon('🧑‍🌾')}).addTo(layer).bindPopup(netPopManej(m)); });
  setTimeout(function(){ map.invalidateSize(); if(pts.length){ try{ map.fitBounds(pts,{padding:[40,40],maxZoom:14}); }catch(e){} } },150);
  var itens=(d.empresas||[]).map(function(e){return netCard('🏪',e.nome,e.segmento,e.cidade,e.whatsapp,e.telefone,e.email);})
    .concat((d.manejadores||[]).filter(function(m){return !m.eu;}).map(function(m){return netCard('🧑‍🌾',m.nome,'Manejador',m.cidade,m.whatsapp,m.telefone,'');}));
  var nl=document.getElementById('netList'); if(nl) nl.innerHTML = itens.length? ('<h3 style="margin:6px 4px">Contatos</h3>'+itens.join('')) : '<div class="empty">Nada por aqui ainda.</div>'; }

   ROTAS (gravar por GPS + guia)
   ============================================================ */
var GEOWATCH=null, ROUTEMAP=null;
var ROTA_REC={ ativo:false, pontos:[] };
var ROTA_GUIA=null;
function distMetros(a,b){ var R=6371000, r=Math.PI/180;
  var dLa=(b.lat-a.lat)*r, dLn=(b.lng-a.lng)*r, la1=a.lat*r, la2=b.lat*r;
  var x=Math.sin(dLa/2)*Math.sin(dLa/2)+Math.cos(la1)*Math.cos(la2)*Math.sin(dLn/2)*Math.sin(dLn/2);
  return 2*R*Math.asin(Math.min(1,Math.sqrt(x))); }
function fmtDist(m){ m=m||0; return m<1000 ? Math.round(m)+' m' : (m/1000).toFixed(2)+' km'; }
function fmtDur(ms){ var s=Math.floor(ms/1000), mm=Math.floor(s/60), ss=s%60, hh=Math.floor(mm/60); mm=mm%60;
  return (hh?hh+'h ':'')+mm+'min '+(ss<10?'0':'')+ss+'s'; }
function simplificar(pts,max){ max=max||800; if(!pts||pts.length<=max) return pts||[]; var step=pts.length/max, out=[]; for(var i=0;i<pts.length;i+=step) out.push(pts[Math.floor(i)]); out.push(pts[pts.length-1]); return out; }
function emojiIcon(emoji,size){ size=size||28; return L.divIcon({html:'<div>'+emoji+'</div>', className:'emoji-mk', iconSize:[size,size], iconAnchor:[size/2,size/2], popupAnchor:[0,-size/2]}); }
var TIPOS_MARCA=[ ['Abate','🐗'], ['Referência','📍'], ['Aviso','⚠️'], ['Rastro','🐾'], ['Água','💧'], ['Comida/isca','🌽'], ['Perigo','☠️'], ['Foto/registro','📷'], ['Outro','📌'] ];
function iconeMarca(t){ for(var i=0;i<TIPOS_MARCA.length;i++) if(TIPOS_MARCA[i][0]===t) return TIPOS_MARCA[i][1]; return '📌'; }
var LASTPOS=null, MARKCTX=null, MARKPOS=null;

VIEWS.rotas=function(){ setTitulo('Rotas'); setCrumb('Rotas de manejo','Rotas'); loadingBox();
  server('apiListarRotas').then(function(l){ CACHE.rota=l;
    l.sort(function(a,b){return String(b.dataCadastro).localeCompare(String(a.dataCadastro));});
    var banner = ROTA_REC.ativo ? '<div class="card" style="border-left:5px solid var(--danger)"><h3 style="margin:0 0 4px">● Gravação em andamento</h3><div class="meta">'+esc(ROTA_REC.nome||'')+' · '+((ROTA_REC.pontos||[]).length)+' pontos</div><button class="btn sm" style="margin-top:8px" onclick="nav(\'rotaGravar\')">Retomar gravação</button></div>' : '';
    var html=banner+(l.length? l.map(function(r){ return '<div class="card"><div class="row"><div class="grow click" onclick="abrirRota(\''+r.id+'\')"><h3>🧭 '+esc(r.nome||'Rota')+'</h3>'+
      '<div class="meta">'+(r.propriedade?esc(r.propriedade)+' · ':'')+esc(r.tipoTransporte||'')+'<br>'+fmtDist(parseFloat(r.distancia)||0)+' · '+((r.pontos||[]).length)+' pts GPS · '+fmtData(r.dataCadastro)+'</div></div><div class="chev">›</div></div>'+
      '<button class="btn sm" style="margin-top:8px;width:auto" onclick="guiarRota(\''+r.id+'\')">🧭 Guiar</button> <button class="ib" style="margin-top:8px" onclick="delItem(\'rota\',\''+r.id+'\')">🗑️</button></div>'; }).join('')
      : '<div class="empty"><div class="big">🧭</div>Nenhuma rota gravada ainda.<br>Toque em <b>Gravar nova rota</b>.</div>');
    app(html); fab('<button class="btn" onclick="nav(\'rotaForm\')">＋ Gravar nova rota</button>'); }); };

VIEWS.rotaForm=function(){ setTitulo('Nova rota'); setCrumb('Rotas','Nova');
  app('<div class="card"><label>Nome da rota *</label><input id="ro_nome" placeholder="Ex: Contorno da mata">'+
    '<label>Propriedade</label><input id="ro_prop" placeholder="Nome da propriedade/fazenda">'+
    '<label>Tipo de transporte</label><select id="ro_tipo">'+TIPOS_TRANSP.map(function(t){return '<option>'+t+'</option>';}).join('')+'</select>'+
    '<div class="meta" style="margin:12px 0 4px"><b>Como criar a rota?</b></div>'+
    '<button class="btn" onclick="comecarGravacao(this)">▶️ Gravar andando (GPS)</button>'+
    '<div class="meta" style="margin:4px 0 8px;font-size:12px">Mantenha o app aberto e o GPS ligado — ele registra sua posição enquanto você percorre o caminho.</div>'+
    '<button class="btn sec" onclick="comecarDesenho(this)">🗺️ Marcar no mapa (clicando)</button>'+
    '<div class="meta" style="margin:4px 0 0;font-size:12px">Abra um mapa e toque/clique nos pontos para desenhar o trajeto — sem precisar estar no local.</div></div>'); };
window.comecarGravacao=function(btn){ var nome=val('ro_nome'); if(!nome){toast('Informe o nome da rota');return;}
  if(!navigator.geolocation){ toast('GPS não suportado neste aparelho'); return; }
  ROTA_REC={ ativo:true, nome:nome, propriedade:val('ro_prop'), tipoTransporte:val('ro_tipo'), pontos:[], distancia:0, inicio:Date.now() };
  STATE.stack=['espreita','rotas','rotaGravar']; render(); };

VIEWS.rotaGravar=function(){ if(!ROTA_REC.ativo){ STATE.stack=['espreita','rotas']; render(); return; }
  if(!ROTA_REC.marcacoes) ROTA_REC.marcacoes=[];
  setTitulo('Gravando rota'); setCrumb('Rotas','Gravando');
  app('<div class="card"><h3 style="margin:0 0 6px">● Gravando: '+esc(ROTA_REC.nome)+'</h3>'+
    '<div class="dash"><div class="kpi"><b id="recDist">0 m</b><span>distância</span></div><div class="kpi"><b id="recPts">0</b><span>pontos</span></div><div class="kpi"><b id="recDur">0s</b><span>tempo</span></div></div>'+
    '<div class="meta" id="recPos" style="margin:6px 0">Aguardando GPS…</div>'+
    '<div id="recMap" style="height:42vh;min-height:250px;border-radius:12px;border:1px solid var(--linha)"></div>'+
    '<button class="btn" onclick="abrirMark(\'rec\')" style="margin-top:12px;background:linear-gradient(#9a7b41,#7a5c2c)">📍 Marcar ponto aqui</button>'+
    '<button class="btn" onclick="pararRota(this)" style="margin-top:10px">⏹️ Parar e salvar</button>'+
    '<button class="btn sec" onclick="cancelarRota()" style="margin-top:8px">Cancelar</button></div>');
  var map=L.map('recMap',{preferCanvas:true,zoomAnimation:false}).setView([-15.78,-47.93],4);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,noWrap:true,attribution:'© OpenStreetMap'}).addTo(map);
  ROUTEMAP=map;
  ROTA_REC._poly=L.polyline(ROTA_REC.pontos.map(function(p){return [p.lat,p.lng];}),{color:'#b23b3b',weight:5}).addTo(map);
  ROTA_REC._me=null; ROTA_REC._markLayer=L.featureGroup().addTo(map);
  if(ROTA_REC.pontos.length) L.marker([ROTA_REC.pontos[0].lat,ROTA_REC.pontos[0].lng],{icon:emojiIcon('🚩')}).addTo(map);
  (ROTA_REC.marcacoes||[]).forEach(function(m){ L.marker([m.lat,m.lng],{icon:emojiIcon(iconeMarca(m.tipo))}).addTo(ROTA_REC._markLayer).bindPopup(marcaPopup(m)); });
  setTimeout(function(){ map.invalidateSize(); if(ROTA_REC.pontos.length){ map.setView([ROTA_REC.pontos[ROTA_REC.pontos.length-1].lat,ROTA_REC.pontos[ROTA_REC.pontos.length-1].lng],16); } },150);
  iniciarWatchGravacao(); atualizarRecUI(); };
function iniciarWatchGravacao(){ if(GEOWATCH!=null) return;
  GEOWATCH=navigator.geolocation.watchPosition(function(pos){
    var p={ lat:+pos.coords.latitude.toFixed(6), lng:+pos.coords.longitude.toFixed(6), t:Date.now() };
    LASTPOS={lat:pos.coords.latitude,lng:pos.coords.longitude};
    var last=ROTA_REC.pontos[ROTA_REC.pontos.length-1];
    if(last){ var dd=distMetros(last,p); if(dd<3) { atualizarRecUI(p); return; } ROTA_REC.distancia+=dd; }
    ROTA_REC.pontos.push(p);
    if(ROUTEMAP&&ROTA_REC._poly){ ROTA_REC._poly.addLatLng([p.lat,p.lng]); ROUTEMAP.setView([p.lat,p.lng],ROUTEMAP.getZoom()<14?16:ROUTEMAP.getZoom());
      if(ROTA_REC._me) ROTA_REC._me.setLatLng([p.lat,p.lng]); else ROTA_REC._me=L.marker([p.lat,p.lng],{icon:emojiIcon(iconeTransp(ROTA_REC.tipoTransporte),30)}).addTo(ROUTEMAP); }
    atualizarRecUI(p);
  }, function(err){ toast('GPS: '+err.message); }, {enableHighAccuracy:true,maximumAge:1000,timeout:20000}); }
function atualizarRecUI(p){ var e;
  if(e=document.getElementById('recDist')) e.textContent=fmtDist(ROTA_REC.distancia);
  if(e=document.getElementById('recPts')) e.textContent=ROTA_REC.pontos.length;
  if(e=document.getElementById('recDur')) e.textContent=fmtDur(Date.now()-(ROTA_REC.inicio||Date.now()));
  if(p&&(e=document.getElementById('recPos'))) e.textContent='Posição: '+p.lat+', '+p.lng; }
window.pararRota=function(btn){ if((ROTA_REC.pontos||[]).length<2){ toast('Rota muito curta — ande um pouco mais'); return; }
  if(GEOWATCH!=null){ try{navigator.geolocation.clearWatch(GEOWATCH);}catch(e){} GEOWATCH=null; }
  btn.disabled=true; btn.textContent='Salvando…';
  var pend=ROTA_REC.marcacoes||[];
  server('apiCriarRota',{ nome:ROTA_REC.nome, propriedade:ROTA_REC.propriedade, tipoTransporte:ROTA_REC.tipoTransporte,
    pontos:simplificar(ROTA_REC.pontos,800), distancia:Math.round(ROTA_REC.distancia||0) })
  .then(function(rota){
    if(!pend.length) return null;
    return pend.reduce(function(ch,m){ return ch.then(function(){ return server('apiCriarMarcacao',{rotaId:rota.id,tipo:m.tipo,lat:m.lat,lng:m.lng,descricao:m.descricao,foto:m.foto||''}); }); }, Promise.resolve());
  })
  .then(function(){ ROTA_REC={ativo:false,pontos:[]}; toast('Rota salva ✔'); STATE.stack=['espreita','rotas']; render(); })
  .catch(function(){ btn.disabled=false; btn.textContent='⏹️ Parar e salvar'; iniciarWatchGravacao(); }); };
window.cancelarRota=function(){ if(!confirm('Descartar esta gravação?'))return;
  if(GEOWATCH!=null){ try{navigator.geolocation.clearWatch(GEOWATCH);}catch(e){} GEOWATCH=null; }
  ROTA_REC={ativo:false,pontos:[]}; STATE.stack=['espreita','rotas']; render(); };

window.guiarRota=function(id){ ROTA_GUIA=(CACHE.rota||[]).filter(function(r){return r.id===id;})[0]; if(!ROTA_GUIA){toast('Rota não encontrada');return;} nav('rotaGuia'); };
VIEWS.rotaGuia=function(){ var r=ROTA_GUIA; if(!r||!(r.pontos||[]).length){ STATE.stack=['espreita','rotas']; render(); return; }
  setTitulo('Guia: '+r.nome); setCrumb('Rotas','Guia');
  app('<div class="card"><h3 style="margin:0 0 6px">🧭 '+esc(r.nome)+'</h3>'+
    '<div class="dash"><div class="kpi"><b id="guiaDist">—</b><span>até a rota</span></div><div class="kpi"><b id="guiaRem">—</b><span>faltam</span></div></div>'+
    '<div class="meta" id="guiaMsg" style="margin:6px 0">Aguardando GPS…</div>'+
    '<div id="guiaMap" style="height:52vh;min-height:300px;border-radius:12px;border:1px solid var(--linha)"></div>'+
    '<button class="btn" onclick="abrirMark(\'guia\')" style="margin-top:12px;background:linear-gradient(#9a7b41,#7a5c2c)">📍 Marcar ponto aqui</button>'+
    '<button class="btn sec" onclick="voltar()" style="margin-top:8px">Encerrar guia</button></div>');
  var pts=r.pontos.map(function(p){return [p.lat,p.lng];});
  var map=L.map('guiaMap',{preferCanvas:true,zoomAnimation:false}).setView(pts[0],15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,noWrap:true,attribution:'© OpenStreetMap'}).addTo(map);
  ROUTEMAP=map;
  L.polyline(pts,{color:'#3b6ea5',weight:5,opacity:.85}).addTo(map);
  L.marker(pts[0],{icon:emojiIcon('🚩')}).addTo(map).bindPopup('Início');
  L.marker(pts[pts.length-1],{icon:emojiIcon('🏁')}).addTo(map).bindPopup('Chegada');
  ROTA_GUIA._markLayer=L.featureGroup().addTo(map);
  server('apiListarMarcacoes',r.id).then(function(ms){ CACHE.marcacao=ms; (ms||[]).forEach(function(m){ var la=coord(m.lat),ln=coord(m.lng); if(!ptOk(la,ln))return; L.marker([la,ln],{icon:emojiIcon(iconeMarca(m.tipo))}).addTo(ROTA_GUIA._markLayer).bindPopup(marcaPopup(m)); }); }).catch(function(){});
  setTimeout(function(){ map.invalidateSize(); try{ map.fitBounds(pts,{padding:[40,40],maxZoom:16}); }catch(e){} },150);
  if(!navigator.geolocation){ toast('GPS não suportado'); return; }
  var me=null;
  GEOWATCH=navigator.geolocation.watchPosition(function(pos){
    var cur={lat:pos.coords.latitude,lng:pos.coords.longitude}; LASTPOS=cur;
    if(me) me.setLatLng([cur.lat,cur.lng]); else me=L.marker([cur.lat,cur.lng],{icon:emojiIcon(iconeTransp(r.tipoTransporte),32),zIndexOffset:1000}).addTo(map);
    map.panTo([cur.lat,cur.lng]);
    var best=Infinity, idx=0;
    for(var i=0;i<r.pontos.length;i++){ var dd=distMetros(cur,r.pontos[i]); if(dd<best){best=dd; idx=i;} }
    var rem=0; for(var j=idx;j<r.pontos.length-1;j++) rem+=distMetros(r.pontos[j],r.pontos[j+1]);
    var e;
    if(e=document.getElementById('guiaDist')) e.textContent=fmtDist(best);
    if(e=document.getElementById('guiaRem')) e.textContent=fmtDist(rem);
    if(e=document.getElementById('guiaMsg')) e.textContent = best>60 ? '⚠️ Você está a '+fmtDist(best)+' da rota — aproxime-se do traçado azul.' : '✅ Na rota. Siga o traçado azul até a chegada 🏁.';
  }, function(err){ toast('GPS: '+err.message); }, {enableHighAccuracy:true,maximumAge:1000,timeout:20000}); };

/* ----- Marcações de ponto (abate, referência, aviso… com foto) ----- */
function marcaPopup(m){ return '<div class="pop"><h4>'+iconeMarca(m.tipo)+' '+esc(m.tipo)+'</h4><div class="meta">'+(m.descricao?esc(m.descricao):'')+(m.dataHora?'<br>'+fmtDataHora(m.dataHora):'')+'</div>'+(m.fotoUrl?'<img src="'+esc(imgSrc(m.fotoUrl))+'" style="width:100%;border-radius:8px;margin-top:6px" onclick="verFoto(\''+esc(imgSrc(m.fotoUrl))+'\')">':'')+'</div>'; }
window.abrirMark=function(ctx,pos){ var P=pos||LASTPOS; if(!P){ toast('Aguardando posição do GPS…'); return; } MARKCTX=ctx; MARKPOS={ lat:+(+P.lat).toFixed(6), lng:+(+P.lng).toFixed(6) };
  var sel=document.getElementById('mk_tipo'); sel.innerHTML=TIPOS_MARCA.map(function(t){return '<option value="'+t[0]+'">'+t[1]+' '+t[0]+'</option>';}).join('');
  document.getElementById('mk_desc').value=''; document.getElementById('mk_foto').value=''; var pv=document.getElementById('mk_prev'); pv.style.display='none'; pv.src='';
  bindFoto('mk_foto','mk_prev'); document.getElementById('markModal').classList.add('open'); };
window.fecharMark=function(){ document.getElementById('markModal').classList.remove('open'); };
window.salvarMarcacao=function(btn){ if(!MARKPOS){ toast('Sem posição'); return; }
  var tipo=val('mk_tipo'), desc=val('mk_desc'), foto=fotoData('mk_foto'); var pos={ lat:MARKPOS.lat, lng:MARKPOS.lng };
  if(MARKCTX==='rec'){
    if(!ROTA_REC.marcacoes) ROTA_REC.marcacoes=[];
    ROTA_REC.marcacoes.push({ tipo:tipo, descricao:desc, foto:foto, lat:pos.lat, lng:pos.lng });
    if(ROUTEMAP&&ROTA_REC._markLayer) L.marker([pos.lat,pos.lng],{icon:emojiIcon(iconeMarca(tipo))}).addTo(ROTA_REC._markLayer).bindPopup(marcaPopup({tipo:tipo,descricao:desc}));
    toast('Ponto marcado ✔ (salva junto com a rota)'); fecharMark(); return;
  }
  if(MARKCTX==='draw'){
    if(!DRAW.marcacoes) DRAW.marcacoes=[];
    DRAW.marcacoes.push({ tipo:tipo, descricao:desc, foto:foto, lat:pos.lat, lng:pos.lng });
    if(ROUTEMAP&&DRAW._markLayer) L.marker([pos.lat,pos.lng],{icon:emojiIcon(iconeMarca(tipo))}).addTo(DRAW._markLayer).bindPopup(marcaPopup({tipo:tipo,descricao:desc}));
    var em=document.getElementById('drawMarks'); if(em) em.textContent=DRAW.marcacoes.length;
    toast('Ponto adicionado ✔ (salva junto com a rota)'); fecharMark(); return;
  }
  btn.disabled=true; btn.textContent='Salvando…';
  var rotaId=(MARKCTX==='guia'&&ROTA_GUIA)?ROTA_GUIA.id:'';
  server('apiCriarMarcacao',{ rotaId:rotaId, tipo:tipo, descricao:desc, lat:pos.lat, lng:pos.lng, foto:foto })
  .then(function(m){ if(ROUTEMAP&&ROTA_GUIA&&ROTA_GUIA._markLayer) L.marker([coord(m.lat),coord(m.lng)],{icon:emojiIcon(iconeMarca(m.tipo))}).addTo(ROTA_GUIA._markLayer).bindPopup(marcaPopup(m));
    toast('Ponto salvo ✔'); fecharMark(); btn.disabled=false; btn.textContent='Salvar ponto'; })
  .catch(function(){ btn.disabled=false; btn.textContent='Salvar ponto'; }); };

/* ----- Detalhe da rota (trajeto + pontos que enriquecem a rota) ----- */
window.abrirRota=function(id){ STATE.rota=(CACHE.rota||[]).filter(function(r){return r.id===id;})[0]; if(STATE.rota) nav('rotaDetalhe'); else toast('Rota não encontrada'); };
VIEWS.rotaDetalhe=function(){ var r=STATE.rota; if(!r){ STATE.stack=['espreita','rotas']; render(); return; }
  setTitulo(r.nome||'Rota'); setCrumb('Rotas',esc(r.nome||'Rota'));
  var pts=(r.pontos||[]).map(function(p){return [p.lat,p.lng];});
  app('<div class="card"><div class="meta">'+(r.propriedade?'🏡 '+esc(r.propriedade)+' · ':'')+esc(r.tipoTransporte||'')+' · '+fmtDist(parseFloat(r.distancia)||0)+'</div></div>'+
    '<div id="rdMap" style="height:44vh;min-height:260px;border-radius:12px;border:1px solid var(--linha)"></div>'+
    '<h3 style="margin:12px 4px 6px">📍 Pontos registrados</h3><div id="rdPontos"><div class="loading"><div class="spin"></div></div></div>');
  var map=L.map('rdMap',{preferCanvas:true,zoomAnimation:false,minZoom:3}).setView(pts.length?pts[0]:[-15.78,-47.93],pts.length?15:4);
  var ruas=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,noWrap:true,attribution:'© OpenStreetMap'});
  var sat=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19,noWrap:true,attribution:'Imagery © Esri'});
  ruas.addTo(map); L.control.layers({'Ruas':ruas,'Satélite':sat},null,{position:'topright'}).addTo(map);
  ROUTEMAP=map;
  if(pts.length){ L.polyline(pts,{color:'#3b6ea5',weight:5,opacity:.85}).addTo(map);
    L.marker(pts[0],{icon:emojiIcon('🚩')}).addTo(map).bindPopup('Início');
    L.marker(pts[pts.length-1],{icon:emojiIcon('🏁')}).addTo(map).bindPopup('Chegada'); }
  var mk=L.featureGroup().addTo(map);
  setTimeout(function(){ map.invalidateSize(); if(pts.length){ try{ map.fitBounds(pts,{padding:[40,40],maxZoom:16}); }catch(e){} } },150);
  server('apiListarMarcacoes',r.id).then(function(ms){ CACHE.marcacao=ms;
    (ms||[]).forEach(function(m){ var la=coord(m.lat),ln=coord(m.lng); if(ptOk(la,ln)) L.marker([la,ln],{icon:emojiIcon(iconeMarca(m.tipo))}).addTo(mk).bindPopup(marcaPopup(m)); });
    var el=document.getElementById('rdPontos'); if(!el) return;
    el.innerHTML=(ms&&ms.length)? ms.map(function(m){ return '<div class="card"><div class="row">'+
      (m.fotoUrl?'<img class="thumb" style="width:54px;height:54px;cursor:zoom-in" onclick="verFoto(\''+esc(imgSrc(m.fotoUrl))+'\')" src="'+esc(imgSrc(m.fotoUrl))+'">':'<div class="ic" style="width:54px;height:54px;font-size:24px;border-radius:10px;background:var(--areia);display:flex;align-items:center;justify-content:center">'+iconeMarca(m.tipo)+'</div>')+
      '<div class="grow"><h3 style="font-size:15px">'+iconeMarca(m.tipo)+' '+esc(m.tipo)+'</h3><div class="meta">'+(m.descricao?esc(m.descricao)+'<br>':'')+fmtDataHora(m.dataHora)+'</div></div><button class="ib" onclick="delItem(\'marcacao\',\''+m.id+'\')" title="Excluir">🗑️</button></div></div>'; }).join('')
      : '<div class="empty">Nenhum ponto ainda. Toque em <b>Guiar</b> e use <b>📍 Marcar ponto</b> no caminho para enriquecer esta rota.</div>';
  }).catch(function(){});
  fab('<button class="btn" onclick="guiarRota(\''+r.id+'\')">🧭 Guiar por esta rota</button>'); };

/* ----- Rota desenhada manualmente (clicando no mapa) ----- */
var DRAW=null;
window.comecarDesenho=function(btn){ var nome=val('ro_nome'); if(!nome){toast('Informe o nome da rota');return;}
  DRAW={ nome:nome, propriedade:val('ro_prop'), tipo:val('ro_tipo'), pontos:[] };
  STATE.stack=['espreita','rotas','rotaDesenhar']; render(); };
VIEWS.rotaDesenhar=function(){ if(!DRAW){ STATE.stack=['espreita','rotas']; render(); return; }
  if(!DRAW.marcacoes) DRAW.marcacoes=[]; if(!DRAW.modo) DRAW.modo='traco';
  setTitulo('Marcar rota'); setCrumb('Rotas','Marcar no mapa');
  app('<div class="card"><h3 style="margin:0 0 4px">🗺️ '+esc(DRAW.nome)+'</h3>'+
    '<div class="row" style="gap:6px;margin-bottom:6px"><button class="btn sm grow" id="btnTraco" onclick="setModoDesenho(\'traco\')">✏️ Traçado</button><button class="btn sm sec grow" id="btnPonto" onclick="setModoDesenho(\'ponto\')">📍 Aviso/Foto</button></div>'+
    '<div class="meta" id="drawHint" style="margin-bottom:6px"></div>'+
    '<div class="dash"><div class="kpi"><b id="drawPts">0</b><span>pontos</span></div><div class="kpi"><b id="drawDist">0 m</b><span>distância</span></div><div class="kpi"><b id="drawMarks">0</b><span>avisos</span></div></div>'+
    '<div id="drawMap" style="height:50vh;min-height:300px;border-radius:12px;border:1px solid var(--linha)"></div>'+
    '<div class="row" style="gap:8px;margin-top:10px"><button class="btn sec grow" onclick="desenhoDesfazer()">↶ Desfazer</button><button class="btn sec grow" onclick="desenhoLimpar()">🗑️ Limpar</button></div>'+
    '<button class="btn" onclick="salvarDesenho(this)" style="margin-top:8px">💾 Salvar rota</button>'+
    '<button class="btn sec" onclick="cancelarDesenho()" style="margin-top:8px">Cancelar</button></div>');
  var map=L.map('drawMap',{preferCanvas:true,zoomAnimation:false,minZoom:3}).setView([-15.78,-47.93],4);
  var ruas=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,noWrap:true,attribution:'© OpenStreetMap'});
  var relevo=L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',{maxZoom:17,noWrap:true,attribution:'© OpenTopoMap'});
  var sat=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19,noWrap:true,attribution:'Imagery © Esri'});
  ruas.addTo(map); L.control.layers({'Ruas':ruas,'Relevo':relevo,'Satélite':sat},null,{position:'topright'}).addTo(map);
  ROUTEMAP=map; DRAW.layer=L.featureGroup().addTo(map); DRAW._markLayer=L.featureGroup().addTo(map);
  map.on('click', function(e){ if(DRAW.modo==='ponto') abrirMark('draw',{lat:e.latlng.lat,lng:e.latlng.lng}); else desenhoAdd(e.latlng.lat, e.latlng.lng); });
  (DRAW.marcacoes||[]).forEach(function(m){ L.marker([m.lat,m.lng],{icon:emojiIcon(iconeMarca(m.tipo))}).addTo(DRAW._markLayer).bindPopup(marcaPopup(m)); });
  setTimeout(function(){ map.invalidateSize();
    if(DRAW.pontos.length){ try{ map.fitBounds(DRAW.pontos.map(function(p){return [p.lat,p.lng];}),{padding:[40,40],maxZoom:16}); }catch(e){} }
    else if(navigator.geolocation){ navigator.geolocation.getCurrentPosition(function(pos){ if(ROUTEMAP===map) map.setView([pos.coords.latitude,pos.coords.longitude],15); }, function(){}, {enableHighAccuracy:true,timeout:8000}); }
  },150);
  redrawDesenho(); setModoDesenho(DRAW.modo); };
window.setModoDesenho=function(m){ if(!DRAW)return; DRAW.modo=m;
  var bt=document.getElementById('btnTraco'), bp=document.getElementById('btnPonto'), h=document.getElementById('drawHint');
  if(bt) bt.className='btn sm grow'+(m==='traco'?'':' sec'); if(bp) bp.className='btn sm grow'+(m==='ponto'?'':' sec');
  if(h) h.innerHTML = m==='ponto' ? '📍 <b>Modo aviso/foto:</b> toque no mapa onde quer colocar um aviso, referência ou foto.' : '✏️ <b>Modo traçado:</b> toque no mapa para ligar os pontos do caminho.'; };
function desenhoAdd(lat,lng){ if(!DRAW)return; DRAW.pontos.push({lat:+lat.toFixed(6),lng:+lng.toFixed(6)}); redrawDesenho(); }
function redrawDesenho(){ if(!DRAW||!DRAW.layer) return; DRAW.layer.clearLayers();
  var pts=DRAW.pontos.map(function(p){return [p.lat,p.lng];});
  if(pts.length>1) L.polyline(pts,{color:'#b23b3b',weight:4}).addTo(DRAW.layer);
  DRAW.pontos.forEach(function(p,i){ L.circleMarker([p.lat,p.lng],{radius:i===0?7:5,color:'#fff',fillColor:i===0?'#2f7d3a':'#b23b3b',fillOpacity:1,weight:2}).addTo(DRAW.layer); });
  var dist=0; for(var i=0;i<DRAW.pontos.length-1;i++) dist+=distMetros(DRAW.pontos[i],DRAW.pontos[i+1]);
  DRAW.distancia=dist; var e;
  if(e=document.getElementById('drawPts')) e.textContent=DRAW.pontos.length;
  if(e=document.getElementById('drawDist')) e.textContent=fmtDist(dist);
  if(e=document.getElementById('drawMarks')) e.textContent=(DRAW.marcacoes||[]).length; }
window.desenhoDesfazer=function(){ if(DRAW&&DRAW.pontos.length){ DRAW.pontos.pop(); redrawDesenho(); } };
window.desenhoLimpar=function(){ if(DRAW){ DRAW.pontos=[]; redrawDesenho(); } };
window.salvarDesenho=function(btn){ if(!DRAW||DRAW.pontos.length<2){ toast('Marque ao menos 2 pontos no traçado'); return; }
  btn.disabled=true; btn.textContent='Salvando…';
  var pend=DRAW.marcacoes||[];
  server('apiCriarRota',{ nome:DRAW.nome, propriedade:DRAW.propriedade, tipoTransporte:DRAW.tipo, pontos:DRAW.pontos, distancia:Math.round(DRAW.distancia||0) })
  .then(function(rota){
    if(!pend.length) return null;
    return pend.reduce(function(ch,m){ return ch.then(function(){ return server('apiCriarMarcacao',{rotaId:rota.id,tipo:m.tipo,lat:m.lat,lng:m.lng,descricao:m.descricao,foto:m.foto||''}); }); }, Promise.resolve());
  })
  .then(function(){ DRAW=null; toast('Rota salva ✔'); STATE.stack=['espreita','rotas']; render(); })
  .catch(function(){ btn.disabled=false; btn.textContent='💾 Salvar rota'; }); };
window.cancelarDesenho=function(){ if(!confirm('Descartar esta rota?'))return; DRAW=null; STATE.stack=['espreita','rotas']; render(); };

function rotuloManejo(t){ return {'Espera':'Espera (com ceva)','Cães':'Meu canil','Espreita':'Rotas de manejo','Armadilha':'Armadilha'}[t]||t; }
function renderAbateCtx(){ var t=val('ab_tipo'), el=document.getElementById('abateCtx'); if(!el) return; var h='';
  if(t==='Espera'){
    h='<label>Ceva *</label><select id="ab_ceva" onchange="carregarAlimentosCeva()"><option value="">Selecione…</option>'+
      ABATEOPTS.cevas.map(function(c){return '<option value="'+c.id+'">'+esc(c.nome||'Ceva')+'</option>';}).join('')+'</select>'+
      '<label>Alimento na ceva</label><select id="ab_alim"><option value="">—</option></select>';
  } else if(t==='Cães'){
    h='<label>Cães na caçada *</label><div class="checks" id="ab_caes">'+
      (ABATEOPTS.caes.length? ABATEOPTS.caes.map(function(c){return '<label class="check" onclick="toggleCheck(this)"><input type="checkbox" value="'+c.id+'">'+esc(c.nome)+' <span class="meta">('+esc(c.funcao||'')+')</span></label>';}).join('') : '<div class="meta">Nenhum cão cadastrado ainda.</div>')+'</div>';
  } else if(t==='Espreita'){
    h='<label>Transporte usado *</label><select id="ab_transp"><option value="">Selecione…</option>'+
      ABATEOPTS.transportes.map(function(t2){return '<option value="'+t2.id+'">'+esc(t2.tipo)+(t2.identificacao?' - '+esc(t2.identificacao):'')+'</option>';}).join('')+'</select>';
  } else if(t==='Armadilha'){
    h='<label>Armadilha *</label><select id="ab_arm"><option value="">Selecione…</option>'+
      ABATEOPTS.armadilhas.map(function(a){return '<option value="'+a.id+'">'+esc(a.tipo)+'</option>';}).join('')+'</select>';
  }
  el.innerHTML=h;
  // prefill contexto em edição
  if(EDIT){ if(t==='Espera'){ setVal('ab_ceva',EDIT.cevaId); if(EDIT.cevaId) carregarAlimentosCeva(EDIT.alimentoId); }
    if(t==='Espreita') setVal('ab_transp',EDIT.transporteId);
    if(t==='Armadilha') setVal('ab_arm',EDIT.armadilhaId);
    if(t==='Cães' && EDIT.caesIds){ var ids=String(EDIT.caesIds).split(',');
      [].slice.call(document.querySelectorAll('#ab_caes input')).forEach(function(inp){ if(ids.indexOf(inp.value)>=0){ inp.checked=true; inp.parentNode.classList.add('on'); } }); } }
}
window.toggleCheck=function(l){ var c=l.querySelector('input'); c.checked=!c.checked; l.classList.toggle('on',c.checked); };
window.carregarAlimentosCeva=function(preselect){ var cid=val('ab_ceva'); var sel=document.getElementById('ab_alim'); if(!sel) return;
  // copia coords da ceva
  var ceva=ABATEOPTS.cevas.filter(function(c){return c.id===cid;})[0];
  if(ceva && !val('ab_lat')){ setVal('ab_lat',ceva.lat); setVal('ab_lng',ceva.lng); }
  if(!cid){ sel.innerHTML='<option value="">—</option>'; return; }
  server('apiListarAlimentos',cid).then(function(l){ sel.innerHTML='<option value="">—</option>'+l.map(function(a){return '<option value="'+a.id+'">'+esc(a.tipo)+' ('+fmtData(a.data)+')</option>';}).join(''); if(preselect) setVal('ab_alim',preselect); }); };
window.salvarAbate=function(btn){ var tipo=val('ab_tipo'); var d={ tipoManejo:tipo, dataHora:val('ab_dh'), quantidade:val('ab_qtd'), sexo:val('ab_sexo'), pesoAprox:val('ab_peso'), lat:val('ab_lat'), lng:val('ab_lng'), obs:val('ab_obs') };
  if(tipo==='Espera'){ d.cevaId=val('ab_ceva'); d.alimentoId=val('ab_alim'); if(!d.cevaId){toast('Selecione a ceva');return;} }
  if(tipo==='Espreita'){ d.transporteId=val('ab_transp'); if(!d.transporteId){toast('Selecione o transporte');return;} }
  if(tipo==='Armadilha'){ d.armadilhaId=val('ab_arm'); if(!d.armadilhaId){toast('Selecione a armadilha');return;} }
  if(tipo==='Cães'){ var ids=[].slice.call(document.querySelectorAll('#ab_caes input:checked')).map(function(c){return c.value;}); if(!ids.length){toast('Selecione ao menos 1 cão');return;} d.caesIds=ids.join(','); }
  if(!d.dataHora){toast('Informe data e hora');return;}
  btn.disabled=true; btn.textContent='Salvando…';
  if(EDIT){ server('apiEditar','abate',EDIT.id,{tipoManejo:d.tipoManejo,dataHora:d.dataHora,quantidade:d.quantidade,sexo:d.sexo,pesoAprox:d.pesoAprox,lat:d.lat,lng:d.lng,obs:d.obs,alimentoId:d.alimentoId||'',caesIds:d.caesIds||'',armadilhaId:d.armadilhaId||'',foto:fotoData('ab_foto')}).then(function(){ EDIT=null; toast('Abate salvo ✔'); voltar(); }).catch(function(){ btn.disabled=false; btn.textContent='Salvar alterações'; }); }
  else { d.foto=fotoData('ab_foto'); server('apiCriarAbate',d).then(function(){ toast('Abate registrado ✔'); voltar(); }).catch(function(){ btn.disabled=false; btn.textContent='Registrar abate'; }); } };

/* ============================================================
   AGENDA DE SAÚDE (cães + cavalos) — com calendário
   ============================================================ */
function diaHoje(){ return new Date().toISOString().substring(0,10); }
function statusProx(prox){ if(!prox) return ''; var p=String(prox).substring(0,10), h=diaHoje(); return p<h?'atrasada':(p===h?'hoje':'proxima'); }
function pad2(n){ return (n<10?'0':'')+n; }
var AGENDA=null, AG_MES=null, AG_DIA=null;

VIEWS.agenda=function(){ setTitulo('Agenda'); setCrumb('Manejo','Agenda'); loadingBox('Carregando agenda…');
  server('apiAgenda').then(function(itens){ AGENDA=itens;
    if(!AG_MES){ var h=new Date(); AG_MES=new Date(h.getFullYear(),h.getMonth(),1); }
    renderAgenda();
  }); };

window.agMes=function(delta){ AG_MES=new Date(AG_MES.getFullYear(),AG_MES.getMonth()+delta,1); AG_DIA=null; renderAgenda(); };
window.agDia=function(k){ AG_DIA=(AG_DIA===k?null:k); renderAgenda(); };

function agItemHtml(i){ var ent=i.escopo==='cao'?'saude':(i.escopo==='cavalo'?'saudeTransp':'manutencao'); var ic=i.escopo==='cao'?'🐕':(i.escopo==='cavalo'?'🐎':'🚗');
  var st=statusProx(i.proximaData); var pill=st==='atrasada'?'<span class="pill dan">Atrasada</span>':(st==='hoje'?'<span class="pill warn">Hoje</span>':(st==='proxima'?'<span class="pill ok">Agendada</span>':''));
  var del = i.fixo ? '' : '<button class="ib" onclick="delItem(\''+ent+'\',\''+i.id+'\')" title="Excluir">🗑️</button>';
  return '<div class="card"><div class="row"><div class="grow"><h3 style="font-size:15px">'+ic+' '+esc(i.animalNome||'')+' — <span class="pill gray">'+esc(i.tipo)+'</span> '+esc(i.descricao||'')+'</h3>'+
    '<div class="meta">'+(i.proximaData?'Próxima: <b>'+fmtData(i.proximaData)+'</b> '+pill:'Feito em '+fmtData(i.data))+(i.obs?'<br>'+esc(i.obs):'')+'</div></div>'+del+'</div></div>'; }

function calendario(itens){
  var y=AG_MES.getFullYear(), m=AG_MES.getMonth(), hoje=diaHoje();
  var inicio=new Date(y,m,1).getDay(), diasNoMes=new Date(y,m+1,0).getDate();
  var byDay={};
  itens.forEach(function(i){
    if(i.proximaData){ var k=String(i.proximaData).substring(0,10); byDay[k]=byDay[k]||{ag:0,re:0,atr:0}; byDay[k].ag++; if(k<hoje) byDay[k].atr++; }
    if(i.data){ var k2=String(i.data).substring(0,10); byDay[k2]=byDay[k2]||{ag:0,re:0,atr:0}; byDay[k2].re++; }
  });
  var nomes=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  var head='<div class="calhead"><button class="ib" onclick="agMes(-1)">‹</button><b>'+nomes[m]+' '+y+'</b><button class="ib" onclick="agMes(1)">›</button></div>';
  var wd=['D','S','T','Q','Q','S','S'].map(function(d){return '<div class="cwd">'+d+'</div>';}).join('');
  var cells=''; for(var i=0;i<inicio;i++) cells+='<div class="cday empty"></div>';
  for(var dia=1;dia<=diasNoMes;dia++){ var k=y+'-'+pad2(m+1)+'-'+pad2(dia); var ev=byDay[k]; var cls='cday';
    if(k===hoje) cls+=' hoje'; if(AG_DIA===k) cls+=' sel';
    var dot=''; if(ev){ cls+=' tem'; var cor= ev.atr? 'var(--danger)' : (ev.ag? 'var(--ok)' : '#98a08f'); dot='<span class="cdot" style="background:'+cor+'"></span>'; }
    cells+='<div class="'+cls+'" onclick="agDia(\''+k+'\')">'+dia+dot+'</div>'; }
  var leg='<div class="legend" style="margin-top:8px"><span><i style="background:var(--danger)"></i>atrasado</span><span><i style="background:var(--ok)"></i>agendado</span><span><i style="background:#98a08f"></i>realizado</span></div>';
  return '<div class="cal">'+head+'<div class="cgrid">'+wd+cells+'</div>'+leg+'</div>';
}

function renderAgenda(){ var itens=AGENDA||[];
  if(!itens.length){ app('<div class="empty"><div class="big">📅</div>Nada na agenda ainda.<br>Registre vacinas e retornos nos cães (na ficha de cada cão) e nos cavalos (no detalhe do transporte).</div>'); return; }
  var h=diaHoje();
  var atrasadas=itens.filter(function(i){return i.proximaData && String(i.proximaData).substring(0,10)<h;}).sort(function(a,b){return String(a.proximaData).localeCompare(String(b.proximaData));});
  var em30=itens.filter(function(i){return i.proximaData && String(i.proximaData).substring(0,10)>=h && (new Date(String(i.proximaData).substring(0,10))-new Date(h))/864e5<=30;}).length;
  var html=calendario(itens);
  html+='<div class="dash"><div class="kpi"><b style="color:var(--danger)">'+atrasadas.length+'</b><span>atrasadas</span></div><div class="kpi"><b>'+em30+'</b><span>próx. 30 dias</span></div><div class="kpi"><b>'+itens.length+'</b><span>registros</span></div></div>';
  if(AG_DIA){
    var doDia=itens.filter(function(i){ return (i.proximaData&&String(i.proximaData).substring(0,10)===AG_DIA) || (i.data&&String(i.data).substring(0,10)===AG_DIA); });
    html+='<div class="row" style="margin:4px 4px 8px"><h3 style="margin:0" class="grow">📆 '+fmtData(AG_DIA)+'</h3><button class="btn sm sec" onclick="agDia(\''+AG_DIA+'\')">Ver tudo</button></div>';
    html+= doDia.length? doDia.map(agItemHtml).join('') : '<div class="empty">Nenhum evento neste dia.</div>';
  } else {
    var proximas=itens.filter(function(i){return i.proximaData && String(i.proximaData).substring(0,10)>=h;}).sort(function(a,b){return String(a.proximaData).localeCompare(String(b.proximaData));});
    var semData=itens.filter(function(i){return !i.proximaData;}).sort(function(a,b){return String(b.data).localeCompare(String(a.data));}).slice(0,20);
    if(atrasadas.length) html+='<h3 style="margin:8px 4px;color:var(--danger)">⚠️ Atrasadas</h3>'+atrasadas.map(agItemHtml).join('');
    if(proximas.length) html+='<h3 style="margin:8px 4px">📌 Próximas</h3>'+proximas.map(agItemHtml).join('');
    if(semData.length) html+='<h3 style="margin:8px 4px;color:var(--txt2)">Histórico recente</h3>'+semData.map(agItemHtml).join('');
  }
  app(html);
}

/* ============================================================
   MAPA (tela cheia, lado direito) com filtro e resumo
   ============================================================ */
var CURRENTMAP=null, MAPDATA=null, MAPLAYER=null;
var MAPFILTER={ espera:true, armadilha:true, busca:true };
function coord(x){ if(x==null) return null; var n=parseFloat(String(x).replace(',','.')); return isNaN(n)?null:n; }
function ptOk(la,ln){ return la!=null&&ln!=null&&la>=-90&&la<=90&&ln>=-180&&ln<=180&&!(la===0&&ln===0); }

VIEWS.mapaGeral=function(){ setTitulo('Mapa'); document.getElementById('crumb').innerHTML=''; app('');
  document.body.classList.add('map-mode'); posicionarMapShell();
  document.getElementById('mapBar').innerHTML=''; document.getElementById('mapPanel').classList.remove('open'); document.getElementById('mapPanel').innerHTML=''; document.getElementById('cevaPanel').classList.remove('open'); document.getElementById('cevaPanel').innerHTML=''; document.getElementById('mapCount').textContent='Carregando…';
  server('apiMapaDados').then(function(d){
    d._cevaN={}; d.cevas.forEach(function(c){d._cevaN[c.id]=c.nome;});
    d._transN={}; d.transportes.forEach(function(t){d._transN[t.id]=t.tipo+(t.identificacao?' - '+t.identificacao:'');});
    d._armN={}; d.armadilhas.forEach(function(a){d._armN[a.id]=a.tipo;});
    d._caoN={}; (d.caes||[]).forEach(function(c){d._caoN[c.id]=c.nome;});
    MAPDATA=d;
    if(CURRENTMAP){ try{CURRENTMAP.remove();}catch(e){} CURRENTMAP=null; }
    var map=L.map('map',{zoomControl:false,preferCanvas:true,zoomAnimation:false,markerZoomAnimation:false,fadeAnimation:false,minZoom:3,maxZoom:19,worldCopyJump:false}).setView([-15.78,-47.93],4);
    L.control.zoom({position:'topright'}).addTo(map);
    var ruas=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{minZoom:3,maxZoom:19,noWrap:true,attribution:'© OpenStreetMap'});
    var relevo=L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',{minZoom:3,maxZoom:17,noWrap:true,attribution:'© OpenTopoMap (CC-BY-SA)'});
    var satelite=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{minZoom:3,maxZoom:19,noWrap:true,attribution:'Imagery © Esri'});
    ruas.addTo(map);
    L.control.layers({'Ruas':ruas,'Relevo':relevo,'Satélite':satelite}, null, {position:'topright',collapsed:true}).addTo(map);
    CURRENTMAP=map; MAPLAYER=L.featureGroup().addTo(map);
    buildMapBar(); buildMapPanel();
    map.whenReady(function(){ map.invalidateSize(); });
    setTimeout(function(){ map.invalidateSize(); desenharMapa(); },180);
    setTimeout(function(){ if(CURRENTMAP===map){ try{map.invalidateSize();}catch(e){} } },600);
  }).catch(function(){ document.getElementById('mapCount').textContent='Falha ao carregar'; }); };

function posicionarMapShell(){ var h=document.querySelector('header'), s=document.getElementById('mapshell'); if(h&&s) s.style.top=h.offsetHeight+'px'; }
window.addEventListener('resize', function(){ if(document.body.classList.contains('map-mode')){ posicionarMapShell(); if(CURRENTMAP){ try{CURRENTMAP.invalidateSize();}catch(e){} } } });

function chipsFiltro(){
  var defs=[ ['espera','🌽 Espera','#b8863b'], ['armadilha','🪤 Armadilha','#b23b3b'], ['busca','🧭 Rotas de manejo','#3b6ea5'] ];
  return defs.map(function(x){ return '<span class="chip'+(MAPFILTER[x[0]]?' on':'')+'" onclick="toggleFiltro(\''+x[0]+'\')"><i style="background:'+x[2]+'"></i>'+x[1]+'</span>'; }).join('');
}
function buildMapBar(){ var b=document.getElementById('mapBar'); if(!b) return;
  b.innerHTML='<span class="chip" onclick="togglePainel()" style="font-weight:700">📊 Resumo</span>'+chipsFiltro(); }
window.toggleFiltro=function(k){ MAPFILTER[k]=!MAPFILTER[k]; buildMapBar(); desenharMapa(); };
window.togglePainel=function(){ var p=document.getElementById('mapPanel'); if(p) p.classList.toggle('open'); };

function buildMapPanel(){ var p=document.getElementById('mapPanel'); if(!p||!MAPDATA) return; var d=MAPDATA, ab=d.abates;
  var porTipo={}; ab.forEach(function(a){ porTipo[a.tipoManejo]=(porTipo[a.tipoManejo]||0)+1; });
  var bars=TIPOS_MANEJO.map(function(t){ return {label:t.substring(0,4), value:porTipo[t]||0, color:TIPO_COR[t]}; });
  var animais=ab.reduce(function(s,a){return s+(parseInt(a.quantidade,10)||0);},0);
  var comGps=ab.filter(function(a){return coord(a.lat)!=null&&coord(a.lng)!=null;}).length;
  var leg=TIPOS_MANEJO.map(function(t){return '<span><i style="background:'+TIPO_COR[t]+'"></i>'+rotuloManejo(t)+'</span>';}).join('');
  p.innerHTML='<div class="row"><h3 class="grow" style="margin:0">📊 Resumo dos abates</h3><button class="ib" onclick="togglePainel()">✕</button></div>'+
    '<div class="dash" style="margin-top:8px"><div class="kpi"><b>'+ab.length+'</b><span>abates</span></div><div class="kpi"><b>'+animais+'</b><span>animais</span></div><div class="kpi"><b>'+comGps+'</b><span>no mapa</span></div></div>'+
    '<h4>Por tipo de manejo</h4>'+barChart(bars,{w:280,h:100})+
    '<h4>Por mês</h4>'+barChart(porMes(ab),{w:280,h:100,color:'#3f6b3f'})+
    '<div class="legend" style="margin-top:8px">'+leg+'</div>'; }

function desenharMapa(){ if(!CURRENTMAP||!MAPDATA) return; var d=MAPDATA; MAPLAYER.clearLayers(); var pts=[];
  function add(m,la,ln){ m.addTo(MAPLAYER); pts.push([la,ln]); }
  if(MAPFILTER.espera) d.cevas.forEach(function(c){ var la=coord(c.lat),ln=coord(c.lng); if(!ptOk(la,ln))return;
    var abs=d.abates.filter(function(a){return a.cevaId===c.id;}), al=d.ultimoAlimento[c.id];
    var pop='<div class="pop"><h4>🌽 '+esc(c.nome||'Ceva')+'</h4><div class="meta"><b>Tipo:</b> '+esc(c.tipo||'—')+'<br><b>Alimento:</b> '+(al?esc(al.tipo)+' ('+fmtData(al.data)+')':'—')+'<br><b>Abates aqui:</b> '+abs.length+'</div>'+(c.fotoUrl?'<img src="'+esc(imgSrc(c.fotoUrl))+'" style="width:100%;border-radius:8px;margin-top:6px">':'')+'<button class="btn sm" style="margin-top:8px" onclick="abrirCevaTimeline(\''+c.id+'\')">📈 Linha do tempo</button></div>';
    var mk=L.circleMarker([la,ln],{radius:13,color:'#5c421c',fillColor:'#b8863b',fillOpacity:.95,weight:3}).bindPopup(pop);
    mk.on('dblclick',function(){ abrirCevaTimeline(c.id); });
    add(mk,la,ln); });
  if(MAPFILTER.armadilha) d.armadilhas.forEach(function(a){ var la=coord(a.lat),ln=coord(a.lng); if(!ptOk(la,ln))return;
    var pop='<div class="pop"><h4>🪤 '+esc(a.tipo)+'</h4><div class="meta"><b>Status:</b> '+esc(a.status||'—')+(a.obs?'<br>'+esc(a.obs):'')+'</div></div>';
    add(L.circleMarker([la,ln],{radius:8,color:'#7a2a2a',fillColor:'#b23b3b',fillOpacity:.9,weight:2}).bindPopup(pop),la,ln); });
  if(MAPFILTER.busca){
    (d.rotas||[]).forEach(function(r){ var line=(r.pontos||[]).map(function(p){return [coord(p.lat),coord(p.lng)];}).filter(function(xy){return ptOk(xy[0],xy[1]);});
      if(line.length>1){ L.polyline(line,{color:'#3b6ea5',weight:4,opacity:.85}).addTo(MAPLAYER); line.forEach(function(xy){pts.push(xy);});
        L.marker(line[0],{icon:emojiIcon('🚩')}).addTo(MAPLAYER).bindPopup('🚩 Início — '+esc(r.nome||'Rota'));
        L.marker(line[line.length-1],{icon:emojiIcon('🏁')}).addTo(MAPLAYER).bindPopup('🏁 Chegada — '+esc(r.nome||'Rota')); }
    });
    (d.marcacoes||[]).forEach(function(m){ var la=coord(m.lat),ln=coord(m.lng); if(!ptOk(la,ln))return;
      L.marker([la,ln],{icon:emojiIcon(iconeMarca(m.tipo))}).addTo(MAPLAYER).bindPopup(marcaPopup(m)); pts.push([la,ln]); });
  }
  d.abates.forEach(function(a){ var fk={'Armadilha':'armadilha'}[a.tipoManejo]; if(!fk||!MAPFILTER[fk])return; var la=coord(a.lat),ln=coord(a.lng); if(!ptOk(la,ln))return;
    var cor=TIPO_COR[a.tipoManejo]||'#666', ctx='';
    if(a.tipoManejo==='Espera') ctx='<b>Ceva:</b> '+esc(d._cevaN[a.cevaId]||'—');
    else if(a.tipoManejo==='Espreita') ctx='<b>Transporte:</b> '+esc(d._transN[a.transporteId]||'—');
    else if(a.tipoManejo==='Armadilha') ctx='<b>Armadilha:</b> '+esc(d._armN[a.armadilhaId]||'—');
    else if(a.tipoManejo==='Cães'){ var nomes=String(a.caesIds||'').split(',').filter(String).map(function(id){return d._caoN[id]||id;}); ctx='<b>Cães:</b> '+esc(nomes.join(', ')||'—'); }
    var pop='<div class="pop"><h4><span style="color:'+cor+'">●</span> Abate — '+esc(rotuloManejo(a.tipoManejo))+'</h4><div class="meta"><b>Data:</b> '+fmtDataHora(a.dataHora)+'<br><b>Qtd:</b> '+esc(a.quantidade||'1')+(a.sexo?' · '+esc(a.sexo):'')+(a.pesoAprox?' · ~'+esc(a.pesoAprox)+'kg':'')+'<br>'+ctx+(a.obs?'<br><b>Obs:</b> '+esc(a.obs):'')+'</div>'+(a.fotoUrl?'<img src="'+esc(imgSrc(a.fotoUrl))+'" style="width:100%;border-radius:8px;margin-top:6px">':'')+(a.tipoManejo==='Espera'&&a.cevaId?'<button class="btn sm" style="margin-top:8px" onclick="abrirCevaTimeline(\''+a.cevaId+'\')">📈 Linha do tempo da ceva</button>':'')+'</div>';
    add(L.circleMarker([la,ln],{radius:8,color:'#333',fillColor:cor,fillOpacity:.9,weight:1.5}).bindPopup(pop),la,ln); });
  var info=document.getElementById('mapCount'); if(info) info.textContent = pts.length? (pts.length+' ponto(s)') : 'Nada com esse filtro (ou sem coordenadas)';
  try{
    if(pts.length===1) CURRENTMAP.setView(pts[0],14);
    else if(pts.length>1) CURRENTMAP.fitBounds(pts,{padding:[40,40],maxZoom:15});
  }catch(e){ CURRENTMAP.setView([-15.78,-47.93],4); }
}

/* ===== Painel: Linha do tempo / Resumo da ceva ===== */
var CEVATL={ cevaId:null, tab:'tl', dim:'Atrativo' };
window.abrirCevaTimeline=function(cevaId){ if(CURRENTMAP) CURRENTMAP.closePopup(); CEVATL.cevaId=cevaId; CEVATL.tab='tl'; CEVATL.dim='Atrativo'; renderCevaPanel(); document.getElementById('cevaPanel').classList.add('open'); };
window.fecharCevaPanel=function(){ document.getElementById('cevaPanel').classList.remove('open'); };
window.cevaTab=function(t){ CEVATL.tab=t; renderCevaPanel(); };
window.cevaDim=function(d){ CEVATL.dim=d; renderCevaPanel(); };
function periodoDe(h){ if(h<6)return'Madrugada'; if(h<12)return'Manhã'; if(h<18)return'Tarde'; return'Noite'; }
function horaDe(iso){ var s=String(iso||''); var i=s.indexOf('T'); return i>0? parseInt(s.substring(i+1,i+3),10) : null; }
function agruparCeva(abs,d,dim){
  var m={};
  abs.forEach(function(a){ var k;
    if(dim==='Atrativo') k=d.alimentoTipo[a.alimentoId]||'—';
    else if(dim==='Sexo') k=a.sexo||'—';
    else if(dim==='Período'){ var h=horaDe(a.dataHora); k=h==null?'—':periodoDe(h); }
    else { var h2=horaDe(a.dataHora); k=h2==null?'—':(h2+'h'); }
    m[k]=(m[k]||0)+1;
  });
  var keys=Object.keys(m);
  if(dim==='Horário') keys.sort(function(a,b){return (parseInt(a,10)||0)-(parseInt(b,10)||0);});
  else if(dim==='Período') keys.sort(function(a,b){var o={'Madrugada':0,'Manhã':1,'Tarde':2,'Noite':3,'—':4};return (o[a]||9)-(o[b]||9);});
  return keys.map(function(k){ return {label:k, value:m[k]}; });
}
window.verFoto=function(url){ if(!url)return; document.getElementById('lightboxImg').src=url; document.getElementById('lightbox').classList.add('open'); };
window.fecharFoto=function(){ document.getElementById('lightbox').classList.remove('open'); };
function timelineCevaHtml(abs,d){
  return '<div class="tl">'+abs.map(function(a){
    var atr=d.alimentoTipo[a.alimentoId]||'—';
    var foto = a.fotoUrl ? '<button class="btn sm sec" style="margin-top:8px;width:auto" onclick="verFoto(\''+esc(imgSrc(a.fotoUrl))+'\')">📷 Ver foto do abate</button>' : '';
    return '<div class="tl-item"><div class="tl-dot"></div><div class="tl-card"><div class="row">'+
      (a.fotoUrl?'<img class="thumb" style="width:52px;height:52px;cursor:zoom-in" onclick="verFoto(\''+esc(imgSrc(a.fotoUrl))+'\')" src="'+esc(imgSrc(a.fotoUrl))+'">':'')+
      '<div class="grow"><div class="dt">'+fmtDataHora(a.dataHora)+'</div><div class="meta">'+
      esc(a.quantidade||'1')+' animal(is)'+(a.sexo?' · '+esc(a.sexo):'')+(a.pesoAprox?' · ~'+esc(a.pesoAprox)+'kg':'')+'<br>🌽 Atrativo: <b>'+esc(atr)+'</b>'+(a.obs?'<br>'+esc(a.obs):'')+'</div></div></div>'+foto+'</div></div>';
  }).join('')+'</div>';
}
function resumoCevaHtml(abs,d){
  var animais=abs.reduce(function(s,a){return s+(parseInt(a.quantidade,10)||0);},0);
  var dims=['Atrativo','Sexo','Período','Horário'];
  var btns=dims.map(function(x){ return '<button class="chip'+(CEVATL.dim===x?' on':'')+'" onclick="cevaDim(\''+x+'\')">'+x+'</button>'; }).join(' ');
  var pairs=agruparCeva(abs,d,CEVATL.dim);
  return '<div class="dash"><div class="kpi"><b>'+abs.length+'</b><span>abates</span></div><div class="kpi"><b>'+animais+'</b><span>animais</span></div></div>'+
    '<div style="display:flex;gap:6px;flex-wrap:wrap;margin:10px 0">'+btns+'</div>'+
    '<h4 style="margin:4px 0 2px;font-size:12px;color:var(--txt2)">Abates por '+CEVATL.dim.toLowerCase()+'</h4>'+
    barChart(pairs,{w:330,h:130,color:TIPO_COR.Espera});
}
function renderCevaPanel(){
  var d=MAPDATA; if(!d) return; var ceva=(d.cevas||[]).filter(function(c){return c.id===CEVATL.cevaId;})[0]; if(!ceva) return;
  var abs=d.abates.filter(function(a){return a.cevaId===ceva.id;}).sort(function(a,b){return String(b.dataHora).localeCompare(String(a.dataHora));});
  var head='<div class="row"><h3 class="grow" style="margin:0">🌽 '+esc(ceva.nome||'Ceva')+'</h3><button class="ib" onclick="fecharCevaPanel()">✕</button></div>'+
    '<div class="tabs" style="margin:10px 0"><div class="tab'+(CEVATL.tab==='tl'?' on':'')+'" onclick="cevaTab(\'tl\')">📈 Linha do tempo</div><div class="tab'+(CEVATL.tab==='res'?' on':'')+'" onclick="cevaTab(\'res\')">📊 Resumo</div></div>';
  var body = !abs.length ? '<div class="empty">Nenhum abate registrado nesta ceva ainda.</div>'
    : (CEVATL.tab==='tl' ? timelineCevaHtml(abs,d) : resumoCevaHtml(abs,d));
  document.getElementById('cevaPanel').innerHTML=head+body;
}

/* ============================================================
   INÍCIO
   ============================================================ */
function iniciar(){ loadingBox('Conectando ao servidor…');
  server('apiPing').then(function(p){ STATE.appNome='JavaStreak'; setTitulo(STATE.appNome);
    if(AUTH.token){ return server('apiBoot').then(function(b){ STATE.tipo=b.tipo||'manejador'; STATE.admin=!!b.admin;
        if(STATE.tipo==='empresa'){ STATE.empresa=b.empresa||null; STATE.manejador=null; STATE.stack=['empresa']; }
        else { STATE.manejador=b.manejador; AUTH.manejador=b.manejador; STATE.empresa=null; STATE.stack=['inicio']; }
        render(); iniciarPromoPoll(); })
      .catch(function(e){ if(!(e&&e.message==='Sessão expirada')){ salvarToken(''); STATE.stack=['login']; render(); } }); }
    STATE.stack=['login']; render();
  }).catch(function(){ app('<div class="empty"><div class="big">⚠️</div>Não consegui falar com o servidor.<br><br>Confira a <b>API_URL</b> e se a implantação está como <b>“Qualquer pessoa”</b>.<div style="max-width:280px;margin:18px auto 0"><button class="btn" onclick="iniciar()">Tentar novamente</button></div></div>'); }); }
iniciar();
</script>
